<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LeanOffice">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="manifest" href="manifest.json">
<title>LeanOffice by StreamLean</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{
  --bg:#04070e;--bg-card:#0a1220;--bg-alt:#0d1a2e;--bg-hover:#101f38;--bg-input:#0a1220;
  --border:rgba(255,255,255,.07);--border-md:rgba(255,255,255,.11);--border-strong:rgba(255,255,255,.2);
  --text-bright:#ffffff;--text-primary:rgba(255,255,255,.92);--text-secondary:rgba(255,255,255,.62);--text-muted:rgba(255,255,255,.35);
  --accent:#60a5fa;--accent-dim:rgba(96,165,250,.1);--accent-border:rgba(96,165,250,.25);
  --green:#4ade80;--red:#f87171;--yellow:#fbbf24;--orange:#fb923c;
  --r-xs:5px;--r-sm:8px;--r-md:12px;--r-lg:16px;--r-xl:24px;
  --nav-w:230px;
  --t-home:#93c5fd;--t-notes:#fde047;--t-tasks:#818cf8;--t-goals:#c084fc;--t-habits:#a3e635;--t-meetings:#2dd4bf;--t-growth:#22d3ee;--t-review:#a78bfa;--t-library:#fb923c;--t-directory:#e879f9;
  --t-build:#60a5fa;--t-market:#f472b6;--t-sales:#4ade80;--t-operations:#f59e0b;--t-finance:#34d399;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text-primary);font-family:'Outfit',sans-serif;font-size:14px;line-height:1.5;overflow:hidden}
button,input,select,textarea{font-family:inherit;color:inherit}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:var(--border-md);border-radius:4px}
::-webkit-scrollbar-track{background:transparent}

/* ---- Auth screen ---- */
#auth-screen{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;padding:24px}
.auth-card{width:100%;max-width:380px;background:var(--bg-card);border:1px solid var(--border-md);border-radius:var(--r-xl);padding:32px 28px;box-shadow:0 32px 80px rgba(0,0,0,.6)}
.auth-logo{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:var(--text-bright);letter-spacing:.06em;margin-bottom:4px;text-align:center}
.auth-logo span{color:var(--accent)}
.auth-sub{font-size:11px;color:var(--text-muted);text-align:center;margin-bottom:28px;font-family:'JetBrains Mono',monospace;letter-spacing:.1em;text-transform:uppercase}
.auth-tabs{display:flex;gap:2px;background:rgba(255,255,255,.05);border:1px solid var(--border-md);border-radius:var(--r-sm);padding:2px;margin-bottom:22px}
.auth-tab{flex:1;padding:7px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600;text-align:center;color:var(--text-muted);transition:all .15s}
.auth-tab.on{background:rgba(96,165,250,.12);color:var(--accent)}
.auth-err{font-size:12px;color:var(--red);margin-bottom:12px;text-align:center;min-height:18px}
.auth-footer{font-size:11px;color:var(--text-muted);text-align:center;margin-top:16px;line-height:1.6}
.auth-footer a{color:var(--accent);cursor:pointer;text-decoration:underline}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;margin-right:5px;flex-shrink:0}
.sync-dot.off{background:var(--text-muted)}
.sync-dot.syncing{background:var(--yellow);animation:pulse-sync .8s infinite}
@keyframes pulse-sync{0%,100%{opacity:1}50%{opacity:.3}}

/* ---- Shell / sidebar ---- */
.shell{display:flex;height:100vh}
.sidebar{width:var(--nav-w);flex-shrink:0;background:rgba(4,7,14,.97);border-right:1px solid var(--border);display:flex;flex-direction:column;position:relative;z-index:100}
.sidebar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
.sb-head{padding:10px 18px 8px;border-bottom:1px solid var(--border)}
.sb-logo{font-family:'Orbitron',monospace;font-size:13px;font-weight:900;letter-spacing:.08em;color:var(--text-bright);margin-bottom:1px}
.sb-logo span{color:var(--accent)}
.sb-sub{font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--text-muted)}
.sb-date{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);margin-top:3px;opacity:.7}
.sb-nav{flex:1;padding:4px 10px;overflow-y:auto;display:flex;flex-direction:column;gap:1px}
.sb-section{padding:12px 12px 4px;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none}
.sb-section:hover{color:var(--text-secondary)}
.sb-caret{font-size:8px}
.sb-group{display:flex;flex-direction:column;gap:1px}
.sb-group.collapsed{display:none}
.nav-btn{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r-sm);border:none;background:transparent;color:var(--text-secondary);cursor:pointer;font-family:'Outfit',sans-serif;font-size:12.5px;font-weight:500;width:100%;text-align:left;transition:all .15s;position:relative}
.nav-btn:hover{background:var(--bg-hover);color:var(--text-primary)}
.nav-btn.active{color:var(--tab-color,var(--accent));background:color-mix(in srgb,var(--tab-color,var(--accent)) 10%,transparent)}
.nav-btn.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:2px;border-radius:0 2px 2px 0;background:var(--tab-color,var(--accent))}
.nav-emoji{font-size:16px;flex-shrink:0;width:20px;text-align:center;transition:transform .15s;line-height:1}
.nav-btn:hover .nav-emoji{transform:scale(1.15)}
.nav-pill{margin-left:auto;min-width:18px;height:16px;border-radius:99px;font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;display:flex;align-items:center;justify-content:center;padding:0 5px}
.sb-biz{padding:10px 14px;border-bottom:1px solid var(--border);position:relative}
.biz-btn{display:flex;align-items:center;gap:8px;width:100%;padding:8px 10px;border-radius:var(--r-sm);border:1px solid var(--border-md);background:var(--bg-card);color:var(--text-primary);cursor:pointer;font-family:'Outfit',sans-serif;font-size:12.5px;font-weight:600;text-align:left}
.biz-btn:hover{background:var(--bg-hover)}
.biz-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.biz-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.biz-caret{font-size:9px;color:var(--text-muted);flex-shrink:0}
.biz-dropdown{position:absolute;top:100%;left:14px;right:14px;margin-top:4px;background:var(--bg-alt);border:1px solid var(--border-md);border-radius:var(--r-md);box-shadow:0 16px 40px rgba(0,0,0,.5);z-index:200;display:none;overflow:hidden}
.biz-dropdown.open{display:block}
.biz-opt{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;font-size:12.5px;color:var(--text-secondary)}
.biz-opt:hover{background:var(--bg-hover);color:var(--text-primary)}
.biz-opt.active{color:var(--accent)}
.biz-opt-new{border-top:1px solid var(--border);color:var(--accent);font-weight:600}
.biz-color-dot{width:26px;height:26px;border-radius:50%;border:none;cursor:pointer;padding:0}
.sb-sync{padding:10px 16px 12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sb-sync-label{font-size:11px;color:var(--text-muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-sync-btn{background:transparent;border:none;color:var(--text-muted);font-size:10px;cursor:pointer;padding:3px 6px;border-radius:4px}
.sb-sync-btn:hover{background:var(--bg-hover);color:var(--text-primary)}

/* ---- Main / tab panels ---- */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.tab-panel{display:none;height:100%;overflow-y:auto;padding:24px 28px}
.tab-panel.active{display:block}
.ph{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.ph-eyebrow{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;opacity:.7;margin-bottom:4px}
.ph-title{font-family:'Orbitron',monospace;font-size:22px;font-weight:800;letter-spacing:.02em}
.ph-sub{font-size:12.5px;color:var(--text-secondary);margin-top:5px;max-width:520px}
.ph-actions{display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap}
.logs-btn{display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--r-sm);border:1px solid var(--border-md);background:transparent;color:var(--text-secondary);cursor:pointer;font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;transition:all .15s}
.logs-btn:hover{background:var(--bg-hover);color:var(--text-primary);border-color:var(--border-strong)}
/* ── Logs page ── */
.logs-bar{height:54px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;padding:0 24px;flex-shrink:0;background:var(--bg-card)}
.logs-back{display:flex;align-items:center;gap:7px;padding:7px 16px;border:1px solid var(--border-md);border-radius:var(--r-sm);background:transparent;color:var(--text-secondary);cursor:pointer;font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;transition:all .15s;flex-shrink:0}
.logs-back:hover{background:var(--bg-hover);color:var(--text-primary);border-color:var(--border-strong)}
.logs-page-title{font-family:'Orbitron',monospace;font-size:12px;font-weight:800;color:var(--text-bright);letter-spacing:.04em;flex:1}
.logs-content{padding:24px 28px;overflow-y:auto;flex:1}
.db-search{background:var(--bg-input);border:1px solid var(--border-md);border-radius:var(--r-xs);padding:6px 12px;font-family:'Outfit',sans-serif;font-size:12px;color:var(--text-primary);outline:none;width:220px;transition:border-color .15s}
.db-search:focus{border-color:var(--accent)}
.db-search::placeholder{color:var(--text-muted)}
.db-count{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);flex-shrink:0}
.db-table{width:100%;border-collapse:collapse;font-size:12px}
.db-table th{text-align:left;font-size:8px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);padding:10px 14px;border-bottom:1px solid var(--border);font-family:'JetBrains Mono',monospace;white-space:nowrap;position:sticky;top:0;background:var(--bg);z-index:1}
.db-table td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text-secondary);vertical-align:middle}
.db-table tr:last-child td{border-bottom:none}
.db-table tbody tr:hover td{background:rgba(255,255,255,.02);color:var(--text-primary)}
.db-empty{padding:48px;text-align:center;font-size:13px;color:var(--text-muted)}
.db-section-label{font-family:'Orbitron',monospace;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);padding:18px 0 8px;display:block}
@media (max-width:768px){
  .db-search{width:100%!important}
  .db-table{font-size:11px;min-width:1000px}
  .db-table th{padding:8px 12px;white-space:nowrap}
  .db-table td{padding:8px 12px;white-space:normal;word-break:break-word}
}

/* ---- Buttons / cards ---- */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--r-sm);border:none;cursor:pointer;font-family:'Outfit',sans-serif;font-weight:600;font-size:12px;transition:all .15s;text-decoration:none}
.btn-primary{background:var(--tab-color,var(--accent));color:#000}
.btn-primary:hover{filter:brightness(1.12)}
.btn-ghost{background:rgba(255,255,255,.06);color:var(--text-secondary);border:1px solid var(--border-md)}
.btn-ghost:hover{background:rgba(255,255,255,.1);color:var(--text-primary)}
.btn-block{width:100%;justify-content:center}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
.card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}
.card-title{font-family:'Orbitron',monospace;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-secondary)}
.card-body{padding:16px 18px}
.card-body.tight{padding:6px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:900px){.grid-2{grid-template-columns:1fr}}

/* ---- Eisenhower matrix ---- */
.matrix-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.matrix-q{border-radius:var(--r-lg);overflow:hidden;border:1px solid var(--border)}
.matrix-qh{padding:10px 14px;display:flex;align-items:center;gap:8px}
.matrix-qh-label{font-family:'Orbitron',monospace;font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase}
.matrix-qh-sub{font-size:10px;color:rgba(255,255,255,.5);margin-top:1px}
.matrix-qb{background:var(--bg-card);padding:8px;min-height:100px;max-height:320px;overflow-y:auto}
.matrix-task{display:flex;align-items:flex-start;gap:8px;padding:7px 8px;border-radius:var(--r-xs);cursor:default;transition:background .1s}
.matrix-task:hover{background:var(--bg-hover)}
.matrix-task.done .matrix-task-title{text-decoration:line-through;color:var(--text-muted)}
.matrix-task-title{font-size:12px;flex:1;line-height:1.4;color:var(--text-primary)}
.matrix-task-notes{font-size:10.5px;color:var(--text-muted);margin-top:2px}
.matrix-empty{padding:18px 8px;text-align:center;font-size:11px;color:var(--text-muted)}
.matrix-unsorted{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;margin-bottom:10px}
.matrix-unsorted-label{font-family:'Orbitron',monospace;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px}
.check-box{cursor:pointer;width:16px;height:16px;border-radius:3px;flex-shrink:0;border:1.5px solid var(--border-strong);display:flex;align-items:center;justify-content:center;font-size:10px;color:#000;margin-top:1px}
.matrix-task.done .check-box{background:var(--tab-color,var(--accent));border-color:var(--tab-color,var(--accent))}
.delete-btn{background:transparent;border:none;color:var(--text-muted);cursor:pointer;padding:3px 4px;border-radius:4px;font-size:11px;flex-shrink:0}
.delete-btn:hover{background:var(--bg-hover);color:var(--text-primary)}
.eim-chip{flex:1;padding:8px;border-radius:var(--r-sm);border:1px solid var(--border-md);background:transparent;color:var(--text-muted);cursor:pointer;font-family:'Outfit',sans-serif;font-weight:600;font-size:12px;text-align:center;transition:all .15s}
.eim-chip.on-urgent{border-color:var(--red);background:rgba(248,113,113,.1);color:var(--red)}
.eim-chip.on-not-urgent{border-color:#60a5fa;background:rgba(96,165,250,.1);color:#60a5fa}
.eim-chip.on-important{border-color:var(--green);background:rgba(74,222,128,.1);color:var(--green)}
.eim-chip.on-not-important{border-color:var(--text-muted);background:rgba(255,255,255,.05);color:var(--text-muted)}

/* ---- Generic list rows / tags / chips ---- */
.list-row{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border)}
.list-row:last-child{border-bottom:none}
.list-row:hover{background:var(--bg-hover)}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600;background:rgba(255,255,255,.06);color:var(--text-secondary)}
.chip-row{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:6px 11px;border-radius:99px;border:1px solid var(--border-md);background:transparent;color:var(--text-muted);cursor:pointer;font-size:11.5px;font-weight:600;transition:all .15s}
.chip.on{border-color:var(--tab-color,var(--accent));background:color-mix(in srgb,var(--tab-color,var(--accent)) 15%,transparent);color:var(--tab-color,var(--accent))}
.status-pill{padding:3px 9px;border-radius:99px;font-size:10px;font-weight:700;cursor:pointer;border:none;flex-shrink:0}
.triage-picker-wrap{position:relative}
.triage-dropdown{position:absolute;top:100%;left:0;margin-top:4px;background:var(--bg-alt);border:1px solid var(--border-md);border-radius:var(--r-md);box-shadow:0 16px 40px rgba(0,0,0,.5);z-index:50;min-width:150px;overflow:hidden}
.triage-opt{padding:8px 12px;font-size:12px;cursor:pointer;color:var(--text-secondary);white-space:nowrap}
.triage-opt:hover{background:var(--bg-hover);color:var(--text-primary)}

/* ---- Capture note cards (matches LeanFlow's note-card / exits-row) ---- */
.note-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-md);padding:14px 16px;margin-bottom:10px;transition:border-color .15s}
.note-card:hover{border-color:var(--border-md)}
.note-text{font-size:13.5px;color:var(--text-primary);line-height:1.65;margin-bottom:10px;white-space:pre-wrap}
.note-footer{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.note-cat{font-size:10px;padding:2px 9px;border-radius:99px;background:rgba(167,139,250,.12);color:#a78bfa;font-weight:600;flex-shrink:0}
.note-dept{font-size:10px;padding:2px 9px;border-radius:99px;background:rgba(255,255,255,.06);color:var(--text-secondary);font-weight:600;flex-shrink:0}
.note-date{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted)}
.note-source{font-size:11px;color:#60a5fa;text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}
.note-source:hover{text-decoration:underline}
.exits-row{display:grid;gap:6px;margin-top:10px}
.exits-row button{font:inherit;font-size:11.5px;font-weight:600;cursor:pointer;padding:7px 0;border-radius:var(--r-xs);border:1px solid var(--border-md);background:transparent;color:var(--text-muted);transition:all .12s;font-family:'Outfit',sans-serif}
.exits-row button.exit-t:hover{background:rgba(129,140,248,.14);color:var(--t-tasks);border-color:transparent}
.exits-row button.exit-e:hover{background:rgba(34,211,238,.14);color:var(--t-growth);border-color:transparent}
.exits-row button.exit-r:hover{background:rgba(251,146,60,.14);color:var(--t-library);border-color:transparent}
.exits-row button.exit-b:hover{background:rgba(251,191,36,.14);color:var(--yellow);border-color:transparent}
.exits-row button.exit-x:hover{background:rgba(248,113,113,.14);color:var(--red);border-color:transparent}
.exit-panel{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.exit-panel.open{display:block}
.exit-panel-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.exit-confirm{font:inherit;font-size:12px;font-weight:700;cursor:pointer;padding:8px 16px;border-radius:var(--r-xs);border:none;color:#000}
.exit-confirm.r{background:var(--t-library)}
@media(max-width:480px){.exits-row{grid-template-columns:repeat(2,1fr)!important}}
.sub-tab-bar{display:flex;gap:2px;background:rgba(255,255,255,.05);border:1px solid var(--border-md);border-radius:var(--r-sm);padding:2px;margin-bottom:16px;width:fit-content}
.sub-tab-btn{padding:7px 16px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600;color:var(--text-muted);border:none;background:transparent}
.sub-tab-btn.on{background:color-mix(in srgb,var(--tab-color,var(--accent)) 15%,transparent);color:var(--tab-color,var(--accent))}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px}
.stat-tile{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-md);padding:14px;text-align:center}
.stat-num{font-family:'Orbitron',monospace;font-size:22px;font-weight:800}
.stat-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-top:4px}
.slider-row{margin-bottom:16px}
.slider-row label{display:flex;justify-content:space-between;font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:8px}
.slider-row input[type=range]{width:100%;accent-color:var(--tab-color,var(--accent))}
.empty-state{padding:30px 14px;text-align:center;color:var(--text-muted);font-size:12px}
.progress-track{height:6px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden}
.progress-fill{height:100%;border-radius:99px;transition:width .2s}
.priority-card{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:var(--r-md);background:var(--bg-card);border:1px solid var(--border);margin-bottom:8px;cursor:pointer}
.priority-card:hover{background:var(--bg-hover)}
.priority-num{font-family:'Orbitron',monospace;font-size:16px;font-weight:900;color:var(--tab-color,var(--accent));width:28px;flex-shrink:0;text-align:center}
.priority-title{font-size:13px;font-weight:600;flex:1}
.priority-sub{font-size:10.5px;color:var(--text-muted);margin-top:2px}
.habit-drag{cursor:grab;color:var(--text-muted);font-size:13px;flex-shrink:0;user-select:none;width:14px;text-align:center}
.habit-drag:active{cursor:grabbing}
.habit-row.drag-over{background:var(--bg-hover);outline:1px dashed var(--t-habits);outline-offset:-1px}

/* ---- Modal ---- */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg-alt);border:1px solid var(--border-md);border-radius:var(--r-xl);width:100%;max-width:480px;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 32px 80px rgba(0,0,0,.8),0 0 0 1px rgba(255,255,255,.04);transform:translateY(12px);transition:transform .25s cubic-bezier(.4,0,.2,1);overflow:hidden;position:relative;margin:16px}
.modal-overlay.open .modal{transform:translateY(0)}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--tab-color,var(--accent)),transparent);pointer-events:none}
.modal-head{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}

.field{margin-bottom:14px}

.field-row{display:flex;gap:12px}
.field-row .field{flex:1}
.input,.select,textarea.input{width:100%;padding:9px 12px;border-radius:var(--r-sm);border:1px solid var(--border-md);background:var(--bg-input);color:var(--text-primary);font-family:'Outfit',sans-serif;font-size:13px}
.input:focus,.select:focus{outline:none;border-color:var(--tab-color,var(--accent))}
textarea.input{resize:vertical;min-height:64px}

/* ---- Toast ---- */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg-alt);border:1px solid var(--border-md);border-radius:var(--r-md);padding:10px 18px;font-size:12px;color:var(--text-primary);opacity:0;pointer-events:none;transition:all .25s;z-index:900}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ---- Mobile ---- */
.mob-header{display:none}
.mob-backdrop{display:none}
@media(max-width:768px){
  .mob-header{display:flex;align-items:center;gap:12px;padding:0 16px;padding-top:env(safe-area-inset-top);padding-left:calc(16px + env(safe-area-inset-left));padding-right:calc(16px + env(safe-area-inset-right));border-bottom:1px solid var(--border);background:var(--bg);position:fixed;top:0;left:0;right:0;z-index:300;min-height:54px}
  .shell{flex-direction:column;padding-top:calc(54px + env(safe-area-inset-top))}
  .mob-hamburger{background:transparent;border:1px solid var(--border-md);color:var(--text-primary);border-radius:var(--r-sm);width:38px;height:38px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent}
  .mob-title{font-family:'Orbitron',monospace;font-size:13px;font-weight:800}

  .sidebar.open{transform:translateX(0)}
  .mob-backdrop.open{display:block;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:390}
  .matrix-grid{grid-template-columns:1fr!important}
  .field-row{flex-direction:column;gap:0}
}
</style>
</head>

<script>
/* ============================================================
   LeanOffice — Business OS
   Home / Capture / Goals / Meetings / Growth / Weekly Review,
   plus 5 department tabs each an Eisenhower matrix of tasks.
   Shares LeanFlow's Supabase project/auth; own sync table.
   ============================================================ */

const $ = id => document.getElementById(id);
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function localDateStr(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function today(){ return localDateStr(new Date()); }
function fmtDateShort(d){ if(!d) return ''; const dt=new Date(d+'T00:00:00'); if(isNaN(dt)) return d; return dt.toLocaleDateString(undefined,{month:'short',day:'numeric'}); }
function fmtTime(t){ if(!t) return ''; const [h,m]=t.split(':').map(Number); const ap=h>=12?'PM':'AM'; const h12=((h+11)%12)+1; return `${h12}:${String(m).padStart(2,'0')} ${ap}`; }
function safeColor(c){ return /^#[0-9a-fA-F]{3,8}$|^[a-zA-Z]+$/.test(String(c||'')) ? c : null; }

// ---------------------------------------------------------------
// Departments — the 5 Eisenhower-matrix tabs are generated from this
// ---------------------------------------------------------------
const DEPTS = [
  {key:'build',      label:'Build',      icon:'🏗️', color:'var(--t-build)',      desc:'Product, engineering, and delivery work.'},
  {key:'market',     label:'Market',     icon:'📣', color:'var(--t-market)',     desc:'Positioning, campaigns, and demand generation.'},
  {key:'sales',      label:'Sales',      icon:'💼', color:'var(--t-sales)',      desc:'Pipeline, outreach, and closing deals.'},
  {key:'operations', label:'Operations', icon:'⚙️', color:'var(--t-operations)', desc:'Systems, SOPs, and the day-to-day running of the business.'},
  {key:'finance',    label:'Finance',    icon:'💰', color:'var(--t-finance)',    desc:'Cash flow, budgeting, and financial planning.'},
];
const LOK = {}; // localStorage key per department (task collections)
DEPTS.forEach(d => { LOK[d.key] = 'lo_' + d.key; d.pill = false; });
function deptOf(key){ return DEPTS.find(d => d.key === key); }

// Overview tabs (fixed, hand-built markup — not homogeneous like DEPTS)
// group: null = ungrouped (Home, sits directly under the business switcher).
const NAV_STATIC = [
  {key:'home',     label:'Home',           icon:'🏠', color:'var(--t-home)',     pill:false, group:null},
  {key:'notes',    label:'Capture',        icon:'💡', color:'var(--t-notes)',    pill:true,  group:'workflow'},
  {key:'tasks',    label:'Tasks',          icon:'✅', color:'var(--t-tasks)',    pill:true,  group:'workflow'},
  {key:'growth',   label:'Growth',         icon:'📈', color:'var(--t-growth)',   pill:true,  group:'workflow'},
  {key:'goals',    label:'Goals',          icon:'🎯', color:'var(--t-goals)',    pill:false, group:'track'},
  {key:'habits',   label:'Habits',         icon:'🔁', color:'var(--t-habits)',   pill:false, group:'track'},
  {key:'meetings', label:'Meetings',       icon:'📅', color:'var(--t-meetings)', pill:false, group:'track'},
  {key:'review',   label:'Weekly Review',  icon:'📊', color:'var(--t-review)',   pill:false, group:'reflect', weekendDot:true},
  {key:'library',  label:'Library',        icon:'📚', color:'var(--t-library)',  pill:false, group:'resources'},
  {key:'directory',label:'Directory',      icon:'👥', color:'var(--t-directory)',pill:false, group:'resources'},
];
const NAV = [...NAV_STATIC, ...DEPTS];
const NAV_GROUPS = [
  {key:'workflow',    label:'Workflow'},
  {key:'departments', label:'Departments'},
  {key:'track',       label:'Track'},
  {key:'reflect',     label:'Reflect'},
  {key:'resources',   label:'Resources'},
];
function navGroupTabs(key){ return key === 'departments' ? DEPTS : NAV_STATIC.filter(t => t.group === key); }

// Single-collection localStorage keys (not per-department)
const NK = { notes:'lo_notes', goals:'lo_goals', habits:'lo_habits', habitLog:'lo_habitLog', meetings:'lo_meetings', growth:'lo_growth', reviews:'lo_reviews', businesses:'lo_businesses', library:'lo_library', directory:'lo_directory', projects:'lo_projects' };
const LIBRARY_CATEGORIES = ['SOPs', 'Playbooks', 'Market', 'Tools', 'General'];

let activeTab = 'home';

// ---------------------------------------------------------------
// Local storage (source of truth for the UI) + Supabase push
// ---------------------------------------------------------------
function load(k){ try{ return JSON.parse(localStorage.getItem(k) || '[]'); } catch{ return []; } }
function save(k, v){
  const oldRaw = localStorage.getItem(k);
  localStorage.setItem(k, JSON.stringify(v));
  sbPush(k, v, oldRaw);
  updateAllPills();
}

// ---------------------------------------------------------------
// Multi-business — collections scoped to a businessId are read via
// loadScoped(). Habits and the Directory (Phase 7) stay global.
// ---------------------------------------------------------------
const BIZ_COLORS = ['#6366f1','#f472b6','#60a5fa','#34d399','#f59e0b','#22d3ee','#4ade80','#fb923c'];
const SCOPED_KEYS = [...DEPTS.map(d => LOK[d.key]), NK.notes, NK.goals, NK.meetings, NK.growth, NK.reviews, NK.projects];
const SCHEMA_KEY = '_lo_schemaVersion';
const ACTIVE_BIZ_KEY = '_lo_activeBusiness';

function getSchemaVersion(){ return parseInt(localStorage.getItem(SCHEMA_KEY) || '0', 10); }
function setSchemaVersion(v){ localStorage.setItem(SCHEMA_KEY, String(v)); }

function migrateToMultiBusiness(){
  if(getSchemaVersion() >= 1) return;
  let businesses = load(NK.businesses);
  if(!businesses.length){
    const biz = {id: uid(), name:'StreamLean', color: BIZ_COLORS[0], createdAt: new Date().toISOString()};
    businesses = [biz];
    SCOPED_KEYS.forEach(k => {
      const arr = load(k);
      let changed = false;
      arr.forEach(item => { if(!item.businessId){ item.businessId = biz.id; changed = true; } });
      if(changed) save(k, arr);
    });
    save(NK.businesses, businesses);
  }
  setSchemaVersion(1);
}

// v1 note.status was null|'in-progress'|'done'|'rejected' (cycled by tapping
// a pill). v2 replaces it with the 5-exit triage model: open|routed|backlog|rejected.
function migrateNoteStatuses(){
  if(getSchemaVersion() >= 2) return;
  const notes = load(NK.notes);
  let changed = false;
  notes.forEach(n => {
    if(n.status === null || n.status === undefined){ n.status = 'open'; changed = true; }
    else if(n.status === 'in-progress'){ n.status = 'routed'; n.routedTo = n.routedTo || {type:'task', dept:n.dept||null}; changed = true; }
    else if(n.status === 'done'){ n.status = 'routed'; n.routedTo = n.routedTo || {type:'manual'}; changed = true; }
  });
  if(changed) save(NK.notes, notes);
  setSchemaVersion(2);
}

function runMigrations(){
  migrateToMultiBusiness();
  migrateNoteStatuses();
}

// Two devices that each run migrateToMultiBusiness() offline before ever
// syncing will each mint their own "StreamLean" business with a different
// id; a later sync pull merges by id, not by name, so both survive as
// duplicates. This reconciles them by name whenever it's called — safe to
// run on every load/pull, a no-op when there's nothing to merge — and
// remaps every businessId reference (including Library, which predates
// SCOPED_KEYS) so no data is orphaned under a removed duplicate.
function mergeDuplicateBusinesses(){
  const businesses = load(NK.businesses);
  if(businesses.length < 2) return;
  const groups = {};
  businesses.forEach(b => {
    const key = (b.name||'').trim().toLowerCase();
    (groups[key] = groups[key] || []).push(b);
  });
  const idRemap = {};
  const survivors = [];
  let changed = false;
  Object.values(groups).forEach(group => {
    if(group.length === 1){ survivors.push(group[0]); return; }
    group.sort((a,b) => (a.createdAt||'') < (b.createdAt||'') ? -1 : 1);
    survivors.push(group[0]);
    group.slice(1).forEach(dup => { idRemap[dup.id] = group[0].id; });
    changed = true;
  });
  if(!changed) return;
  [...SCOPED_KEYS, NK.library].forEach(k => {
    const arr = load(k);
    let arrChanged = false;
    arr.forEach(item => {
      if(item.businessId && idRemap[item.businessId]){ item.businessId = idRemap[item.businessId]; arrChanged = true; }
    });
    if(arrChanged) save(k, arr);
  });
  save(NK.businesses, survivors);
  if(idRemap[activeBusinessId]){
    activeBusinessId = idRemap[activeBusinessId];
    localStorage.setItem(ACTIVE_BIZ_KEY, activeBusinessId);
  }
}

let activeBusinessId = localStorage.getItem(ACTIVE_BIZ_KEY) || null;
function getBusinesses(){ return load(NK.businesses); }
function activeBusiness(){
  const list = getBusinesses();
  return list.find(b => b.id === activeBusinessId) || list[0] || null;
}
function setActiveBusiness(id){
  activeBusinessId = id;
  localStorage.setItem(ACTIVE_BIZ_KEY, id);
  closeBizDropdown();
  renderBizSwitcher();
  rerenderScopedViews();
}
function loadScoped(k){
  const biz = activeBusiness();
  return load(k).filter(x => x.businessId === (biz && biz.id));
}

function allDeptTasks(){
  return DEPTS.flatMap(d => load(LOK[d.key]).map(t => ({...t, _dept: d.key})));
}
function allDeptTasksScoped(){
  return DEPTS.flatMap(d => loadScoped(LOK[d.key]).map(t => ({...t, _dept: d.key})));
}

// ---------------------------------------------------------------
// Eisenhower matrix (department tabs)
// ---------------------------------------------------------------
const EIM_Q = [
  {u:'urgent',    i:'important',     key:'q1', label:'DO FIRST',  sub:'Urgent + Important',         color:'var(--red)',    bg:'rgba(248,113,113,.08)'},
  {u:'not-urgent',i:'important',     key:'q2', label:'SCHEDULE',  sub:'Not Urgent + Important',      color:'#60a5fa',       bg:'rgba(96,165,250,.08)'},
  {u:'urgent',    i:'not-important', key:'q3', label:'DELEGATE',  sub:'Urgent + Not Important',      color:'var(--yellow)', bg:'rgba(251,191,36,.08)'},
  {u:'not-urgent',i:'not-important', key:'q4', label:'ELIMINATE', sub:'Not Urgent + Not Important',  color:'var(--text-muted)', bg:'rgba(255,255,255,.03)'},
];

function taskRow(dept, t){
  const proj = t.projectId ? loadScoped(NK.projects).find(p => p.id === t.projectId) : null;
  return `
    <div class="matrix-task ${t.done?'done':''}">
      <div class="check-box" onclick="toggleTask('${dept}','${t.id}')">${t.done?'✓':''}</div>
      <div style="flex:1;min-width:0">
        <div class="matrix-task-title">${esc(t.title)}</div>
        ${t.due?`<div style="font-size:10px;color:var(--text-muted);font-family:'JetBrains Mono',monospace">📅 ${fmtDateShort(t.due)}</div>`:''}
        ${proj?`<span class="tag">📁 ${esc(proj.name)}</span>`:''}
        ${t.notes?`<div class="matrix-task-notes">${esc(t.notes)}</div>`:''}
      </div>
      <button class="delete-btn" onclick="editTask('${dept}','${t.id}')" title="Edit">✏️</button>
      <button class="delete-btn" onclick="deleteTask('${dept}','${t.id}')" title="Delete">✕</button>
    </div>`;
}

function renderMatrix(dept){
  const el = $('matrix-' + dept);
  if(!el) return;
  const due = t => t.due || '9999-99-99';
  const byDue = (a,b) => due(a) < due(b) ? -1 : due(a) > due(b) ? 1 : 0;
  const all = loadScoped(LOK[dept]).filter(t => !t.done);

  const assigned = {q1:[], q2:[], q3:[], q4:[]};
  const unsorted = [];
  all.forEach(t => {
    const q = EIM_Q.find(q => q.u === t.urgency && q.i === t.importance);
    if(q) assigned[q.key].push(t); else unsorted.push(t);
  });
  Object.keys(assigned).forEach(k => assigned[k].sort(byDue));
  unsorted.sort(byDue);

  const quadrant = q => `
    <div class="matrix-q">
      <div class="matrix-qh" style="background:${q.bg};border-bottom:2px solid ${q.color}">
        <div>
          <div class="matrix-qh-label" style="color:${q.color}">${q.label}</div>
          <div class="matrix-qh-sub">${q.sub}</div>
        </div>
        <span style="margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10px;color:${q.color}">${assigned[q.key].length}</span>
      </div>
      <div class="matrix-qb">
        ${assigned[q.key].length ? assigned[q.key].map(t => taskRow(dept,t)).join('') : `<div class="matrix-empty">Empty</div>`}
      </div>
    </div>`;

  const unsortedSection = unsorted.length ? `
    <div class="matrix-unsorted">
      <div class="matrix-unsorted-label">⊡ Unsorted — open a task to assign a quadrant</div>
      ${unsorted.map(t => taskRow(dept,t)).join('')}
    </div>` : '';

  el.innerHTML = `<div class="matrix-grid">${EIM_Q.map(quadrant).join('')}</div>${unsortedSection}`;
}

function updateAllPills(){
  const setPill = (key, n) => { const el = $('pill-'+key); if(el) el.textContent = n; };
  setPill('notes', loadScoped(NK.notes).filter(n => n.status === 'open').length);
  setPill('tasks', allDeptTasksScoped().filter(t => !t.done && t.due && t.due <= today()).length);
  const undecided = s => [...(s.lessons||[]), ...(s.ideas||[])].filter(x => !x.decided).length;
  setPill('growth', loadScoped(NK.growth).filter(g => g.category === 'source').reduce((sum,s) => sum + undecided(s), 0));
}

function toggleTask(dept, id){
  const tasks = load(LOK[dept]);
  const t = tasks.find(x => x.id === id);
  if(!t) return;
  t.done = !t.done;
  save(LOK[dept], tasks);
  renderMatrix(dept);
  if(activeTab === 'tasks') renderTasks();
  if(activeTab === 'home') renderHome();
}

function deleteTask(dept, id){
  const tasks = load(LOK[dept]).filter(x => x.id !== id);
  save(LOK[dept], tasks);
  renderMatrix(dept);
}

// ---------------------------------------------------------------
// Task modal (add / edit) — shared across all 5 departments
// ---------------------------------------------------------------
let _eimUrgency = null, _eimImportance = null;
let _editingTask = null, _editingGoal = null, _editingHabit = null, _editingMeeting = null, _outcomeMeetingId = null;
let _editingProject = null, _newProjectGoalId = null;
let currentSaveFn = null;

function setEim(dim, val){
  if(dim === 'urgency'){
    _eimUrgency = _eimUrgency === val ? null : val;
    const u = $('eim-urgent'), nu = $('eim-not-urgent');
    if(u) u.className = 'eim-chip' + (_eimUrgency === 'urgent' ? ' on-urgent' : '');
    if(nu) nu.className = 'eim-chip' + (_eimUrgency === 'not-urgent' ? ' on-not-urgent' : '');
  } else {
    _eimImportance = _eimImportance === val ? null : val;
    const i = $('eim-important'), ni = $('eim-not-important');
    if(i) i.className = 'eim-chip' + (_eimImportance === 'important' ? ' on-important' : '');
    if(ni) ni.className = 'eim-chip' + (_eimImportance === 'not-important' ? ' on-not-important' : '');
  }
}
function resetEim(){
  _eimUrgency = null; _eimImportance = null;
  ['eim-urgent','eim-not-urgent','eim-important','eim-not-important'].forEach(id => { const el=$(id); if(el) el.className='eim-chip'; });
}

  return `
    <div class="field"><label>Task *</label><input class="input" id="lo-task-title" placeholder="What needs to get done?"></div>
    <div class="field"><label>Due Date</label><input class="input" id="lo-task-due" type="date"></div>
    <div class="field"><label>Notes</label><textarea class="input" id="lo-task-notes" placeholder="Optional context"></textarea></div>
    <div class="field">
      <label>Eisenhower — Urgency</label>
      <div style="display:flex;gap:8px">
        <button type="button" class="eim-chip" id="eim-urgent" onclick="setEim('urgency','urgent')">⚡ Urgent</button>

function openTaskModal(dept){
  const d = deptOf(dept);
  _editingTask = {dept, id:null};
  resetEim();
  $('modalTitle').textContent = 'New Task — ' + d.label;
  $('modalBody').innerHTML = taskModalHtml();
  $('modalFoot').innerHTML = `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="currentSaveFn()">Save</button>`;
  currentSaveFn = saveTaskForm;
  document.documentElement.style.setProperty('--tab-color', d.color);
  $('modalOverlay').classList.add('open');
  setTimeout(() => { const f=$('lo-task-title'); if(f) f.focus(); }, 100);
}

function editTask(dept, id){
  const t = load(LOK[dept]).find(x => x.id === id);
  if(!t) return;
  const d = deptOf(dept);
  _editingTask = {dept, id};
  resetEim();
  $('modalTitle').textContent = 'Edit Task — ' + d.label;
  $('modalBody').innerHTML = taskModalHtml();
  $('modalFoot').innerHTML = `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="currentSaveFn()">Save</button>`;
  currentSaveFn = saveTaskForm;
  document.documentElement.style.setProperty('--tab-color', d.color);
  $('lo-task-title').value = t.title || '';
  $('lo-task-due').value = t.due || '';
  $('lo-task-notes').value = t.notes || '';
  if(t.urgency) setEim('urgency', t.urgency);
  if(t.importance) setEim('importance', t.importance);
  if($('lo-task-project')) $('lo-task-project').value = t.projectId || '';
  $('modalOverlay').classList.add('open');
  setTimeout(() => { const f=$('lo-task-title'); if(f) f.focus(); }, 100);
}

function saveTaskForm(){
  const title = $('lo-task-title').value.trim();
  if(!title){ alert('Task title required'); return; }
  const {dept, id} = _editingTask;
  const tasks = load(LOK[dept]);
  const fields = {
    title,
    due: $('lo-task-due').value || '',
    notes: $('lo-task-notes').value.trim(),
    urgency: _eimUrgency || null,
    importance: _eimImportance || null,
    projectId: ($('lo-task-project') || {value:''}).value || null,
  };
  if(id){
    const i = tasks.findIndex(t => t.id === id);
    if(i >= 0) tasks[i] = {...tasks[i], ...fields};
  } else {
    tasks.unshift({id: uid(), businessId: activeBusinessId, ...fields, done:false, created: today()});
  }
  save(LOK[dept], tasks);
  closeModal();
  renderMatrix(dept);
  if(activeTab === 'tasks') renderTasks();
  if(activeTab === 'home') renderHome();
}

function closeModal(){
  $('modalOverlay').classList.remove('open');
  currentSaveFn = null;
  _editingTask = null; _editingGoal = null; _editingHabit = null; _editingMeeting = null; _outcomeMeetingId = null;
  _editingContact = null; _editingLibrary = null; _mtgSelectedContacts = [];
  _editingProject = null; _newProjectGoalId = null;
  resetEim();
}
function closeModalOutside(e){ if(e.target === $('modalOverlay')) closeModal(); }

function renderHome(){
  // Unified cross-business Today list + quick-add + weekend card
  const businesses = getBusinesses();
  const bizById = Object.fromEntries(businesses.map(b => [b.id, b]));
  const due = allDeptTasks()
    .filter(t => !t.done && t.due && t.due <= today())
    .map(t => ({...t, _biz: bizById[t.businessId]}))
    .sort((a,b) => a.due < b.due ? -1 : a.due > b.due ? 1 : 0);
  $('home-today').innerHTML = due.length ? due.map(homeTodayRow).join('') : `<div class="empty-state">Nothing due today or overdue 🎉</div>`;
  $('home-quick-add').innerHTML = homeQuickAddHtml();
  $('home-weekend').innerHTML = homeWeekendCardHtml();

  // Original active-business-scoped dashboard cards
  const tasks = allDeptTasksScoped().filter(t => !t.done);
  const score = t => {
    let s = 0;
    if(t.due && t.due < today()) s += 80;
    else if(t.due === today()) s += 40;
    if(t.urgency === 'urgent') s += 20;
    if(t.importance === 'important') s += 15;
    return s;
  };
  const top = tasks.map(t => ({...t, _score: score(t)})).filter(t => t._score > 0).sort((a,b) => b._score - a._score).slice(0,3);
  const prEl = $('home-priorities');
  if(prEl){
    prEl.innerHTML = top.length ? `
      <div class="card" style="margin-bottom:14px">
        <div class="card-header"><div class="card-title">Top Priorities</div></div>
        <div class="card-body tight">
          ${top.map((t,i) => `
            <div class="priority-card" onclick="toggleTask('${t._dept}','${t.id}')">
              <div class="priority-num">0${i+1}</div>
              <div style="flex:1">
                <div class="priority-title">${esc(t.title)}</div>
                <div class="priority-sub">${deptOf(t._dept).icon} ${deptOf(t._dept).label}${t.due?' · 📅 '+fmtDateShort(t.due):''}</div>
              </div>
            </div>`).join('')}
        </div>
      </div>` : '';
  }

  const dueToday = tasks.filter(t => t.due === today()).slice(0,6);
  $('home-tasks').innerHTML = dueToday.length ? dueToday.map(t => `
    <div class="list-row">
      <div class="check-box" onclick="toggleTask('${t._dept}','${t.id}')">${t.done?'✓':''}</div>
      <div style="flex:1"><div class="matrix-task-title">${esc(t.title)}</div><span class="tag">${deptOf(t._dept).icon} ${deptOf(t._dept).label}</span></div>
    </div>`).join('') : `<div class="empty-state">Nothing due today</div>`;

  const meetsToday = loadScoped(NK.meetings).filter(m => m.date === today()).sort((a,b) => (a.time||'') < (b.time||'') ? -1 : 1);
  $('home-meetings').innerHTML = meetsToday.length ? meetsToday.map(m => `
    <div class="list-row">
      <div style="flex:1">
        <div class="matrix-task-title">${esc(m.title)}</div>
        <div class="matrix-task-notes">${m.time?fmtTime(m.time):'All day'}${m.dept?' · '+deptOf(m.dept).icon+' '+deptOf(m.dept).label:''}</div>
      </div>
    </div>`).join('') : `<div class="empty-state">No meetings today</div>`;

  const goals = loadScoped(NK.goals).slice(0,5);
  $('home-goals').innerHTML = goals.length ? goals.map(g => `
    <div class="list-row">
      <div style="flex:1">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px"><span class="matrix-task-title">${esc(g.title)}</span><span style="font-size:11px;color:${safeColor(g.color)||'var(--accent)'}">${g.progress||0}%</span></div>
        <div class="progress-track"><div class="progress-fill" style="width:${g.progress||0}%;background:${safeColor(g.color)||'var(--accent)'}"></div></div>
      </div>
    </div>`).join('') : `<div class="empty-state">No goals yet</div>`;

  const notes = loadScoped(NK.notes).slice(0,5);
  $('home-notes').innerHTML = notes.length ? notes.map(n => `
    <div class="list-row">
      <div style="flex:1"><div class="matrix-task-title">${esc(n.text.slice(0,80))}</div><span class="tag">${esc(n.category||'')}</span></div>
    </div>`).join('') : `<div class="empty-state">Nothing captured yet</div>`;

  renderHomeHabits();
}

function renderHomeHabits(){
  const habits = load(NK.habits);
  const log = load(NK.habitLog);

  if(!el) return;
  if(!habits.length){ el.innerHTML = `<div class="empty-state">No habits set up</div>`; return; }
  el.innerHTML = habits.slice(0,6).map(h => {
    const done = log.some(e => e.habitId === h.id && e.date === today());
    return `
    <div class="list-row" style="cursor:pointer" onclick="toggleHabitDay('${h.id}','${today()}')">
      <div class="check-box" style="${done?'background:var(--t-habits);border-color:var(--t-habits)':''}">${done?'✓':''}</div>
      <div style="flex:1"><span class="matrix-task-title">${h.icon||'⭐'} ${esc(h.name)}</span></div>
    </div>`;
  }).join('');
}

function noteSourceTag(n){
  if(!n.source) return '';
  let host = 'Link';
  try{ host = new URL(n.source).hostname.replace('www.',''); }catch{}
  return `<a href="${esc(n.source)}" target="_blank" rel="noopener" class="note-source">🔗 ${esc(host)}</a>`;
}

function noteUrl(n){
  if(n.source) return n.source;
  const m = (n.text||'').match(/https?:\/\/\S+/);
  return m ? m[0] : null;
}

// ---------------------------------------------------------------
// Capture triage — 5 exits: Task, Extract, Reference, Backlog, Reject.
// Routing writes into the destination collection immediately; only
// the browsing UI for Growth's To Learn queue (Phase 5) and Library
// (Phase 6) lands later — the data shape is final now.
// ---------------------------------------------------------------
function toggleExitPanel(id, type){
  const other = type === 'task' ? 'reference' : 'task';
  const otherEl = $(`exitpanel-${id}-${other}`);
  if(otherEl) otherEl.classList.remove('open');
  const el = $(`exitpanel-${id}-${type}`);
  if(el) el.classList.toggle('open');
}

function afterTriage(msg){
  renderNotes();
  updateAllPills();
  if(activeTab === 'home') renderHome();
  if(msg) showToast(msg);
}

function triageToTask(noteId, dept){
  const notes = load(NK.notes);
  const n = notes.find(x => x.id === noteId);
  if(!n) return;
  const tasks = load(LOK[dept]);
  tasks.unshift({id: uid(), businessId: activeBusinessId, title: n.text.slice(0,120), due:'', notes:'', urgency:'not-urgent', importance:'important', done:false, created: today()});
  save(LOK[dept], tasks);
  n.status = 'routed';
  n.routedTo = {type:'task', dept};
  save(NK.notes, notes);
  renderMatrix(dept);
  afterTriage('Routed to ' + deptOf(dept).label + ' tasks');
}

function triageExtract(noteId){
  const notes = load(NK.notes);
  const n = notes.find(x => x.id === noteId);
  if(!n) return;
  const url = noteUrl(n);
  if(!url) return;
  const items = load(NK.growth);
  items.unshift({id: uid(), businessId: activeBusinessId, category:'to-learn', url, title: n.text.slice(0,120), status:'queued', sourceNoteId: n.id, createdAt: new Date().toISOString()});
  save(NK.growth, items);
  n.status = 'routed';
  n.routedTo = {type:'growth'};
  save(NK.notes, notes);
  afterTriage('Sent to Growth → To Learn');
}

function triageToLibrary(noteId, category){
  const notes = load(NK.notes);
  const n = notes.find(x => x.id === noteId);
  if(!n) return;
  const items = load(NK.library);
  items.unshift({id: uid(), businessId: activeBusinessId, title: n.text.slice(0,120), url: n.source||'', content: n.text, summary:'', category, sourceId:null, createdAt: new Date().toISOString()});
  save(NK.library, items);
  n.status = 'routed';
  n.routedTo = {type:'library', category};
  save(NK.notes, notes);
  afterTriage('Saved to Library → ' + category);
}

function triageBacklog(noteId){
  const notes = load(NK.notes);
  const n = notes.find(x => x.id === noteId);
  if(!n) return;
  n.status = 'backlog';
  save(NK.notes, notes);
  afterTriage();
}

function triageReject(noteId){
  const notes = load(NK.notes);
  const n = notes.find(x => x.id === noteId);
  if(!n) return;
  n.status = 'rejected';
  save(NK.notes, notes);
  afterTriage();
}

function noteCard(n){
  const url = noteUrl(n);
  const exited = n.status === 'routed' || n.status === 'rejected';
  const exitCount = [true, !!url, true, n.status !== 'backlog', true].filter(Boolean).length;
  const ns = NOTE_LOG_STATUSES.find(s => s.v === n.status);
  return `
    <div class="note-card" id="notecard-${n.id}">
      <div class="note-text">${esc(n.text)}</div>
      <div class="note-footer">
        ${exited && ns?`<span style="font-size:9px;font-weight:700;padding:2px 9px;border-radius:99px;border:1px solid color-mix(in srgb,${ns.col} 30%,transparent);background:${ns.bg};color:${ns.col};font-family:'Outfit',sans-serif;letter-spacing:.06em;text-transform:uppercase">${ns.l}</span>`:''}
        ${n.category?`<span class="note-cat">${esc(n.category)}</span>`:''}
        ${n.dept?`<span class="note-dept">${deptOf(n.dept).icon} ${deptOf(n.dept).label}</span>`:''}
        ${noteSourceTag(n)}
        <span class="note-date" style="margin-left:auto">${fmtDateShort(n.created)}</span>

function showEditNoteCustomCat(){

  inp.value = NOTE_CATS.includes(_editingNote.category) ? '' : (_editingNote.category || '');

function setEditNoteCustomCat(v){ _editingNote.category = v.trim() || NOTE_CATS[0]; renderEditNoteChips(); }

function editNote(id){
  const n = load(NK.notes).find(x => x.id === id);
  if(!n) return;
  _editingNote = {id: n.id, category: n.category, dept: n.dept};
  $('modalTitle').textContent = 'Edit Note';
  $('modalBody').innerHTML = noteModalHtml();
  $('modalFoot').innerHTML = `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="currentSaveFn()">Save</button>`;

function saveNoteForm(){
  const text = $('lo-note-text').value.trim();
  if(!text){ alert('Note text required'); return; }
  const notes = load(NK.notes);
  const i = notes.findIndex(n => n.id === _editingNote.id);
  if(i >= 0){
    notes[i] = {...notes[i], text, category: _editingNote.category, dept: _editingNote.dept, source: $('lo-note-source').value.trim()};
    save(NK.notes, notes);
  }
  closeModal();
  renderNotes();
  if(activeTab === 'home') renderHome();
}

const TASKS_LENSES = [{key:'today', label:'Today'}, {key:'all', label:'All Open'}, {key:'projects', label:'Projects'}];
let _tasksLens = 'today';
let _tasksGroupCollapsed = {};

function tasksTabHtml(){

    <div id="tab-tasks" class="tab-panel ${activeTab==='tasks'?'active':''}">

function switchTasksLens(k){

function toggleTasksGroup(dept){ _tasksGroupCollapsed[dept] = !_tasksGroupCollapsed[dept]; renderTasks(); }

function taskRowTasks(t){
  const d = deptOf(t._dept);

function renderTasks(){
  const lensEl = $('tasks-lenses');
  if(!lensEl) return;
  lensEl.innerHTML = TASKS_LENSES.map(l => `<button type="button" class="sub-tab-btn ${l.key===_tasksLens?'on':''}" onclick="switchTasksLens('${l.key}')">${l.label}</button>`).join('');
  if(_tasksLens === 'projects'){ renderTasksProjects(); return; }
  const all = allDeptTasksScoped().filter(t => !t.done);
  if(_tasksLens === 'today'){
    const due = all.filter(t => t.due && t.due <= today()).sort((a,b) => a.due < b.due ? -1 : a.due > b.due ? 1 : 0);
    $('tasks-list').innerHTML = due.length ? `<div class="card">${due.map(taskRowTasks).join('')}</div>` : `<div class="empty-state">Nothing due today or overdue 🎉</div>`;

    const byDept = DEPTS.map(d => ({d, tasks: all.filter(t => t._dept === d.key).sort((a,b) => (a.due||'9999') < (b.due||'9999') ? -1 : 1)}));
    $('tasks-list').innerHTML = byDept.map(({d,tasks}) => {
      const collapsed = !!_tasksGroupCollapsed[d.key];
      return `

// ── Projects — bridges Goals and Tasks. A project optionally links to a
// Goal (progress rollup shown there) and groups tasks from any department
// (tasks carry their own dept; a project is dept-agnostic). ──
const PROJECT_STATUSES = ['planned', 'active', 'paused', 'done'];
const PROJECT_STATUS_LABEL = {planned:'Planned', active:'Active', paused:'Paused', done:'Done'};
const PROJECT_STATUS_COLOR = {planned:'var(--text-muted)', active:'var(--t-tasks)', paused:'var(--yellow)', done:'var(--green)'};
let _projectsCollapsed = {};
function toggleProjectCollapse(id){ _projectsCollapsed[id] = !_projectsCollapsed[id]; renderTasksProjects(); }

function _projTaskRow(t){
  return `
    <div class="matrix-task ${t.done?'done':''}">
      <div class="check-box" onclick="toggleTask('${t._dept}','${t.id}');renderTasksProjects()">${t.done?'✓':''}</div>
      <div style="flex:1;min-width:0">
        <div class="matrix-task-title">${esc(t.title)}</div>
        <div style="margin-top:2px;display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          <span class="tag" style="color:${deptOf(t._dept).color}">${deptOf(t._dept).icon} ${deptOf(t._dept).label}</span>
          ${t.due?`<span class="matrix-task-notes">📅 ${fmtDateShort(t.due)}</span>`:''}
        </div>
      </div>
      <button class="delete-btn" onclick="editTask('${t._dept}','${t.id}')" title="Edit">✏️</button>
      <button class="delete-btn" onclick="deleteTask('${t._dept}','${t.id}');renderTasksProjects()" title="Delete">✕</button>
    </div>`;
}

function renderTasksProjects(){
  const el = $('tasks-list');
  if(!el) return;
  const tasks = allDeptTasksScoped();
  const projects = loadScoped(NK.projects);
  const byProject = {}; projects.forEach(p => byProject[p.id] = []);
  const noProject = [];
  tasks.forEach(t => { if(t.projectId && byProject[t.projectId]) byProject[t.projectId].push(t); else noProject.push(t); });

  const groupCard = (id, label, statusHtml, list) => {
    const collapsed = !!_projectsCollapsed[id];
    const doneCt = list.filter(t => t.done).length;
    return `<div class="card" style="margin-bottom:12px">
      <div class="card-header" style="cursor:pointer" onclick="toggleProjectCollapse('${id}')">
        <span style="display:flex;align-items:center;gap:8px;min-width:0">
          <span class="card-title" style="color:var(--t-tasks);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(label)}</span>
          ${statusHtml}
        </span>
        <span style="display:flex;align-items:center;gap:10px;flex-shrink:0">
          <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-muted)">${doneCt}/${list.length} done</span>
          ${id!=='__none__'?`<button class="delete-btn" onclick="event.stopPropagation();openProjectModal('${id}')" title="Edit">✏️</button>
          <button class="delete-btn" onclick="event.stopPropagation();deleteProject('${id}')" title="Delete">✕</button>`:''}
          <span style="color:var(--text-muted);font-size:11px">${collapsed?'▸':'▾'}</span>
        </span>
      </div>
      ${collapsed ? '' : `<div class="card-body tight">${list.length ? list.map(_projTaskRow).join('') : '<div class="empty-state">No tasks yet</div>'}</div>`}
    </div>`;
  };

  let html = projects.map(p => {
    const statusHtml = `<span class="tag" style="color:${PROJECT_STATUS_COLOR[p.status]}">${PROJECT_STATUS_LABEL[p.status]||p.status}</span>`;
    return groupCard(p.id, p.name, statusHtml, byProject[p.id] || []);
  }).join('');
  html += groupCard('__none__', 'No project', '', noProject);

  if(!projects.length && !noProject.length){
    el.innerHTML = `<div class="empty-state">No projects yet — click "+ New Project" to start grouping tasks.</div>`;
    return;
  }
  el.innerHTML = html;
}

const GOAL_COLORS = ['#c084fc','#f472b6','#60a5fa','#34d399','#f59e0b','#22d3ee','#4ade80','#fb923c'];
const GOAL_CATS = ['Company-wide', ...DEPTS.map(d => d.label)];

function goalsTabHtml(){
  return `
    <div id="tab-goals" class="tab-panel ${activeTab==='goals'?'active':''}">
      <div class="ph">
        <div>

      </div>

function goalDaysInfo(deadline){
  if(!deadline) return {label:'No deadline', color:'var(--text-muted)'};
  const days = Math.ceil((new Date(deadline+'T12:00:00') - new Date()) / 86400000);
  const color = days < 0 ? 'var(--red)' : days <= 7 ? 'var(--yellow)' : 'var(--text-muted)';
  const label = days < 0 ? `${Math.abs(days)}d overdue` : days === 0 ? 'Due today' : days === 1 ? '1 day left' : `${days} days left`;
  return {label, color};
}

function renderGoals(){
  const goals = loadScoped(NK.goals).slice().sort((a,b) => (a.deadline||'9999') < (b.deadline||'9999') ? -1 : 1);
  $('goals-list').innerHTML = goals.length ? goals.map(g => {
    const di = goalDaysInfo(g.deadline);
    const color = safeColor(g.color) || 'var(--t-goals)';
    const ms = g.milestones || [];
    return `
    <div class="card" style="margin-bottom:12px">
      <div class="card-body">
        <div style="display:flex;justify-content:space-between;gap:10px;margin-bottom:8px">
          <div>
            <span class="tag">${esc(g.cat||'General')}</span>
            <div style="font-size:15px;font-weight:700;margin-top:6px">${esc(g.title)}</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:${color}">${g.progress||0}%</div>
            <div style="font-size:10.5px;color:${di.color};margin-top:2px">${di.label}</div>
          </div>
        </div>
        <div class="progress-track" style="margin-bottom:10px"><div class="progress-fill" style="width:${g.progress||0}%;background:${color}"></div></div>
        ${ms.length ? `<div style="display:flex;flex-direction:column;gap:4px;margin-bottom:8px">${ms.map((m,i) => `
          <div style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;${m.done?'color:var(--text-muted);text-decoration:line-through':''}" onclick="toggleMilestone('${g.id}',${i})">
            <div class="check-box" style="${m.done?`background:${color};border-color:${color}`:''}">${m.done?'✓':''}</div>${esc(m.text)}
          </div>`).join('')}</div>` : ''}
        ${_goalProjectsHtml(g.id)}
        <div style="display:flex;gap:8px;justify-content:flex-end">
          <button class="delete-btn" onclick="openGoalModal('${g.id}')">✏️ Edit</button>
          <button class="delete-btn" onclick="deleteGoal('${g.id}')">✕ Delete</button>
        </div>
      </div>
    </div>`;
  }).join('') : `<div class="empty-state">No goals yet — set your first target.</div>`;
}

function toggleMilestone(id, i){
  const goals = load(NK.goals);
  const g = goals.find(x => x.id === id);
  if(!g || !g.milestones[i]) return;
  g.milestones[i].done = !g.milestones[i].done;
  save(NK.goals, goals);
  renderGoals();
}
function deleteGoal(id){
  save(NK.goals, load(NK.goals).filter(g => g.id !== id));
  const projects = load(NK.projects);
  let changed = false;
  projects.forEach(p => { if(p.goalId === id){ p.goalId = null; changed = true; } });
  if(changed) save(NK.projects, projects);
  renderGoals();
  if(activeTab === 'home') renderHome();
}

// ── Goal <-> Project linking ──
function newProjectForGoal(goalId){ _editingProject = null; _newProjectGoalId = goalId; openProjectModal(); }
function linkExistingProjectToGoal(goalId){
  const sel = $('goal-link-proj-' + goalId);
  if(!sel || !sel.value) return;
  const projects = load(NK.projects);
  const p = projects.find(x => x.id === sel.value);
  if(!p) return;
  p.goalId = goalId;
  save(NK.projects, projects);
  renderGoals();
}
function unlinkProjectFromGoal(projectId){
  const projects = load(NK.projects);
  const p = projects.find(x => x.id === projectId);
  if(!p) return;
  p.goalId = null;
  save(NK.projects, projects);
  renderGoals();
}
function _goalProjectsHtml(goalId){
  const allProjects = loadScoped(NK.projects);
  const linked = allProjects.filter(p => p.goalId === goalId);
  const unlinked = allProjects.filter(p => p.goalId !== goalId);
  const tasks = allDeptTasksScoped();
  const rows = linked.map(p => {
    const list = tasks.filter(t => t.projectId === p.id);
    const done = list.filter(t => t.done).length;
    const pct = list.length ? Math.round(done / list.length * 100) : 0;
    return `<div style="margin-bottom:6px">
      <div style="display:flex;align-items:center;justify-content:space-between;font-size:11px;margin-bottom:3px">
        <span style="color:var(--text-secondary)">${esc(p.name)}</span>
        <span style="display:flex;align-items:center;gap:6px">
          <span style="color:var(--text-muted);font-family:'JetBrains Mono',monospace">${done}/${list.length}</span>
          <button class="delete-btn" style="font-size:11px;padding:0" onclick="unlinkProjectFromGoal('${p.id}')" title="Unlink">✕</button>
        </span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${PROJECT_STATUS_COLOR[p.status]||'var(--t-tasks)'}"></div></div>
    </div>`;
  }).join('');
  const linkExisting = unlinked.length ? `
    <div style="display:flex;gap:6px;margin-top:8px">
      <select class="select" id="goal-link-proj-${goalId}" style="font-size:11px;flex:1;padding:4px 8px;height:auto">
        ${unlinked.map(p => `<option value="${p.id}">${esc(p.name)}</option>`).join('')}
      </select>
      <button class="btn btn-ghost" style="font-size:10px;padding:4px 10px" onclick="linkExistingProjectToGoal('${goalId}')">Link</button>
    </div>` : '';
  return `<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <span style="font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted)">📁 Projects</span>
      <button class="btn btn-ghost" style="font-size:10px;padding:2px 8px" onclick="newProjectForGoal('${goalId}')">+ New</button>
    </div>
    ${rows || '<div style="font-size:11px;color:var(--text-muted);margin-bottom:2px">No projects linked yet.</div>'}
    ${linkExisting}
  </div>`;
}

function openProjectModal(id){

let _habitMonthYear = new Date().getFullYear();
let _habitMonthIdx = new Date().getMonth();
let _habitDragId = null;

  return `

function habitMonthPrev(){ _habitMonthIdx--; if(_habitMonthIdx<0){_habitMonthIdx=11;_habitMonthYear--;} renderHabits(); }
function habitMonthNext(){ _habitMonthIdx++; if(_habitMonthIdx>11){_habitMonthIdx=0;_habitMonthYear++;} renderHabits(); }
function habitMonthToday(){ _habitMonthYear=new Date().getFullYear(); _habitMonthIdx=new Date().getMonth(); renderHabits(); }

function calcStreak(habitId, log){
  const doneDates = new Set(log.filter(e => e.habitId === habitId).map(e => e.date));
  const d = new Date();
  let ds = localDateStr(d);
  if(!doneDates.has(ds)) d.setDate(d.getDate()-1);
  let streak = 0;
  while(doneDates.has(localDateStr(d))){
    streak++;
    d.setDate(d.getDate()-1);
  }
  return streak;
}

function habitDragStart(e, id){
  _habitDragId = id;
  e.dataTransfer.effectAllowed = 'move';
}
function habitDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}
function habitDrop(e, targetId){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(!_habitDragId || _habitDragId === targetId){ _habitDragId = null; return; }
  const habits = load(NK.habits);
  const fromIdx = habits.findIndex(h => h.id === _habitDragId);
  const toIdx = habits.findIndex(h => h.id === targetId);
  if(fromIdx < 0 || toIdx < 0){ _habitDragId = null; return; }
  const [moved] = habits.splice(fromIdx, 1);
  habits.splice(toIdx, 0, moved);
  save(NK.habits, habits);
  _habitDragId = null;
  renderHabits();
}
function habitDragEnd(){ _habitDragId = null; }

function toggleHabitDay(habitId, date){
  const log = load(NK.habitLog);
  const idx = log.findIndex(e => e.habitId === habitId && e.date === date);
  if(idx >= 0) log.splice(idx, 1);
  else log.push({id: uid(), habitId, date});
  save(NK.habitLog, log);
  if(activeTab === 'habits') renderHabits();
  if(activeTab === 'home') renderHome();
}

function renderHabitStats(){
  const habits = load(NK.habits);
  const log = load(NK.habitLog);
  const todayDone = habits.filter(h => log.some(e => e.habitId === h.id && e.date === today())).length;
  const bestStreak = habits.length ? Math.max(0, ...habits.map(h => calcStreak(h.id, log))) : 0;
  $('habit-stats').innerHTML = [
    {val:habits.length, label:'Total Habits', color:'var(--t-habits)'},
    {val:todayDone, label:'Done Today', color:'var(--t-habits)'},
    {val:habits.length-todayDone, label:'Remaining', color:'var(--t-review)'},
    {val:bestStreak+'🔥', label:'Best Streak', color:'var(--yellow)'},
  ].map(s => `<div class="stat-tile"><div class="stat-num" style="color:${s.color}">${s.val}</div><div class="stat-label">${s.label}</div></div>`).join('');
}

function renderHabits(){
  renderHabitStats();
  const habits = load(NK.habits);
  const log = load(NK.habitLog);
  const year = _habitMonthYear, month = _habitMonthIdx;
  $('habit-month-label').textContent = new Date(year, month, 1).toLocaleDateString(undefined,{month:'long', year:'numeric'});
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const todayStr = today();
  const days = [];
  for(let d=1; d<=daysInMonth; d++) days.push(`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
  const grid = $('habit-month-grid');
  if(!habits.length){
    grid.innerHTML = `<div class="empty-state">No habits yet — add your first one above.</div>`;
    return;
  }
  const nameW = 152, trailW = 150;
  const dowHeader = `
    <div style="display:flex;align-items:center;gap:8px;padding:0 0 6px">
      <div style="width:${nameW}px;flex-shrink:0"></div>
      <div style="flex:1;display:flex;gap:3px">
        ${days.map(ds => {
          const isT = ds === todayStr;
          return `<div style="flex:1;min-width:20px;text-align:center;font-size:8px;font-family:'JetBrains Mono',monospace;color:${isT?'var(--t-habits)':'var(--text-muted)'}">${new Date(ds+'T12:00:00').getDate()}</div>`;
        }).join('')}
      </div>
      <div style="width:${trailW}px;flex-shrink:0"></div>
    </div>`;
  const rows = habits.map(h => {
    const doneDates = new Set(log.filter(e => e.habitId === h.id).map(e => e.date));
    const monthDone = days.filter(ds => doneDates.has(ds)).length;
    const streak = calcStreak(h.id, log);
    const cells = days.map(ds => {
      const isDone = doneDates.has(ds);
      const isToday = ds === todayStr;
      return `<div title="${ds}" style="flex:1;min-width:20px;height:20px;border-radius:3px;background:${isDone?'var(--t-habits)':'rgba(255,255,255,.06)'};border:1.5px solid ${isToday?'var(--t-habits)':'transparent'};cursor:pointer" onclick="toggleHabitDay('${h.id}','${ds}')"></div>`;
    }).join('');
    return `
      <div class="habit-row" style="display:flex;align-items:center;gap:8px;padding:6px 0;border-top:1px solid var(--border)" ondragover="habitDragOver(event)" ondrop="habitDrop(event,'${h.id}')" ondragleave="this.classList.remove('drag-over')">
        <div style="display:flex;align-items:center;gap:8px;width:${nameW}px;flex-shrink:0;overflow:hidden">
          <span class="habit-drag" draggable="true" ondragstart="habitDragStart(event,'${h.id}')" ondragend="habitDragEnd()" title="Drag to reorder">⠿</span>
          <span style="font-size:15px">${h.icon||'⭐'}</span>
          <span style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(h.name)}">${esc(h.name)}</span>
        </div>
        <div style="flex:1;display:flex;gap:3px">${cells}</div>
        <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;width:${trailW}px;justify-content:flex-end">
          <span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted)">${monthDone}/${daysInMonth}</span>
          <span style="font-size:11px">${streak}🔥</span>
          <button class="delete-btn" onclick="openHabitModal('${h.id}')" title="Edit">✏️</button>
          <button class="delete-btn" onclick="deleteHabit('${h.id}')" title="Delete">✕</button>
        </div>
      </div>`;
  }).join('');
  grid.innerHTML = dowHeader + rows;
}

function openOutcomeModal(id){
  _outcomeMeetingId = id;
  const m = load(NK.meetings).find(x => x.id === id);
  $('modalTitle').textContent = 'Log Outcome';
  $('modalBody').innerHTML = `
    <div class="field"><label>Outcome</label><div class="chip-row" id="lo-outcome-chips">${OUTCOME_OPTS.map(o => `<button type="button" class="chip ${m&&m.outcome===o.v?'on':''}" onclick="selectOutcome('${o.v}')">${o.l}</button>`).join('')}</div><input type="hidden" id="lo-outcome-val" value="${m?m.outcome||'':''}"></div>
    <div class="field"><label>Notes</label><textarea class="input" id="lo-outcome-notes">${m?esc(m.outcomeNotes||''):''}</textarea></div>`;
  $('modalFoot').innerHTML = `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="currentSaveFn()">Save</button>`;
  currentSaveFn = saveOutcomeForm;
  document.documentElement.style.setProperty('--tab-color', 'var(--t-meetings)');
  $('modalOverlay').classList.add('open');
}

function saveOutcomeForm(){
  const meetings = load(NK.meetings);
  const i = meetings.findIndex(m => m.id === _outcomeMeetingId);
  if(i < 0) return;
  meetings[i].outcome = $('lo-outcome-val').value || null;
  meetings[i].outcomeNotes = $('lo-outcome-notes').value.trim();
  meetings[i].done = true;
  save(NK.meetings, meetings);
  closeModal();
  renderMeetings();
}

function renderMeetings(){
  const meetings = loadScoped(NK.meetings).slice().sort((a,b) => (a.date+(a.time||'')) < (b.date+(b.time||'')) ? -1 : 1);
  const upcoming = meetings.filter(m => m.date >= today() && !m.done);
  const past = meetings.filter(m => m.date < today() || m.done);
  const contacts = load(NK.directory);
  const row = m => {
    const oc = OUTCOME_OPTS.find(o => o.v === m.outcome);
    const taggedNames = (m.contactIds||[]).map(id => contacts.find(c => c.id === id)?.name).filter(Boolean);
    return `
    <div class="list-row">
      <div style="flex:1;min-width:0">
        <div class="matrix-task-title">${esc(m.title)}</div>
        <div class="matrix-task-notes">📅 ${fmtDateShort(m.date)}${m.time?' · '+fmtTime(m.time):''}${m.dept?' · '+deptOf(m.dept).icon+' '+deptOf(m.dept).label:''}${m.attendees?' · '+esc(m.attendees):''}${taggedNames.length?' · 👥 '+esc(taggedNames.join(', ')):''}</div>
        ${oc?`<span class="tag" style="margin-top:4px;color:${oc.color}">${oc.l}</span>`:''}
      </div>
      <button class="delete-btn" onclick="openOutcomeModal('${m.id}')" title="Log outcome">✓</button>
      <button class="delete-btn" onclick="openMeetingModal('${m.id}')" title="Edit">✏️</button>
      <button class="delete-btn" onclick="deleteMeeting('${m.id}')" title="Delete">✕</button>
    </div>`;
  };
  $('meetings-list').innerHTML = `
    <div class="card" style="margin-bottom:14px">
      <div class="card-header"><div class="card-title">Upcoming</div></div>
      <div>${upcoming.length ? upcoming.map(row).join('') : `<div class="empty-state">Nothing scheduled</div>`}</div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title">Past</div></div>
      <div>${past.length ? past.slice(0,15).map(row).join('') : `<div class="empty-state">No past meetings</div>`}</div>
    </div>`;
}

let _growthArchiveOpen = false;
let _lessonPicker = null;
let _extractionToLearnId = null;
let _editingToLearn = null;

function growthTabHtml(){

function toLearnHost(url){ try{ return new URL(url).hostname.replace('www.',''); }catch{ return url; } }

function toLearnRow(g){
  return `
    <div class="list-row">
      <button class="status-pill" style="background:color-mix(in srgb,var(--t-growth) 18%,transparent);color:var(--t-growth)" onclick="cycleToLearnStatus('${g.id}')">${esc(g.status)}</button>
      <div style="flex:1;min-width:0">
        <div class="matrix-task-title">${esc(g.title||toLearnHost(g.url))}</div>
        <a href="${esc(g.url)}" target="_blank" rel="noopener" class="matrix-task-notes" style="text-decoration:none;display:inline-block;margin-top:2px">🔗 ${esc(toLearnHost(g.url))}</a>
      </div>
      <button class="delete-btn" onclick="openExtractionModal('${g.id}')" title="Process into a Learned source">→ Process</button>

    </div>`;
}

function toggleLessonPicker(sourceId, lessonId){
  _lessonPicker = (_lessonPicker && _lessonPicker.sourceId===sourceId && _lessonPicker.lessonId===lessonId) ? null : {sourceId, lessonId};
  renderGrowth();
}
document.addEventListener('click', e => {
  if(_lessonPicker && !e.target.closest('.triage-picker-wrap')){ _lessonPicker = null; renderGrowth(); }
}, true);

function sourceCard(s){
  const lessonRow = l => `
    <div class="list-row" style="${l.decided?'opacity:.45':''}">
      <div style="flex:1;min-width:0"><div class="matrix-task-title">📖 ${esc(l.text)}</div></div>
      ${l.decided ? `<span class="tag">${l.keptToLibrary?'Kept':'Discarded'}</span>` : `
        <div class="triage-picker-wrap">
          <button type="button" class="chip" onclick="toggleLessonPicker('${s.id}','${l.id}')">Keep → Library</button>
          ${_lessonPicker && _lessonPicker.sourceId===s.id && _lessonPicker.lessonId===l.id ? `<div class="triage-dropdown">${LIBRARY_CATEGORIES.map(c => `<div class="triage-opt" onclick="keepLessonToLibrary('${s.id}','${l.id}','${c}')">${c}</div>`).join('')}</div>` : ''}
        </div>
        <button class="delete-btn" onclick="discardLesson('${s.id}','${l.id}')" title="Discard">✕</button>`}
    </div>`;
  const ideaRow = i => `
    <div class="list-row" style="${i.decided?'opacity:.45':''}">
      <div style="flex:1;min-width:0"><div class="matrix-task-title">💡 ${esc(i.text)}</div></div>
      ${i.decided ? `<span class="tag">${i.actedOn?'Acted on':'Discarded'}</span>` : `
        <button type="button" class="chip" onclick="actOnIdea('${s.id}','${i.id}')">Act</button>
        <button class="delete-btn" onclick="discardIdea('${s.id}','${i.id}')" title="Discard">✕</button>`}
    </div>`;
  return `
    <div class="card" style="margin-bottom:14px">
      <div class="card-header">
        <div>
          <div class="card-title">${esc(s.sourceName)}</div>
          ${s.summary?`<div class="matrix-task-notes" style="margin-top:4px">${esc(s.summary)}</div>`:''}
        </div>
      </div>
      ${(s.lessons||[]).map(lessonRow).join('')}
      ${(s.ideas||[]).map(ideaRow).join('')}
      ${(!s.lessons||!s.lessons.length) && (!s.ideas||!s.ideas.length) ? `<div class="empty-state">No lessons or ideas logged</div>` : ''}
    </div>`;
}

function toggleGrowthArchive(){ _growthArchiveOpen = !_growthArchiveOpen; renderGrowth(); }

function renderGrowth(){
  const items = loadScoped(NK.growth);
  const queue = items.filter(g => g.category === 'to-learn' && g.status !== 'done').sort((a,b) => (b.createdAt||'') < (a.createdAt||'') ? -1 : 1);
  $('toLearnCount').textContent = `(${queue.length})`;
  $('to-learn-list').innerHTML = queue.length ? queue.map(toLearnRow).join('') : `<div class="empty-state">Nothing queued — extract a link from Capture or add one here.</div>`;

  const sources = items.filter(g => g.category === 'source');
  const isDecided = s => [...(s.lessons||[]), ...(s.ideas||[])].every(x => x.decided);
  const active = sources.filter(s => !isDecided(s));
  const archived = sources.filter(isDecided);
  $('learned-list').innerHTML = active.length ? active.map(sourceCard).join('') : `<div class="empty-state">Nothing processed yet</div>`;
  $('learned-archive').innerHTML = archived.length ? `
    <div class="card-header" style="padding-left:0;border-bottom:none;cursor:pointer" onclick="toggleGrowthArchive()"><div class="card-title">Decided (${archived.length}) ${_growthArchiveOpen?'▾':'▸'}</div></div>
    ${_growthArchiveOpen ? archived.map(sourceCard).join('') : ''}` : '';
}

// ---- To Learn: add / edit / delete / cycle status ----
function addToLearnModalHtml(){
  return `
    <div class="field"><label>URL *</label><input class="input" id="lo-tl-url" placeholder="https://..."></div>
    <div class="field"><label>Title</label><input class="input" id="lo-tl-title" placeholder="What is it?"></div>`;
}
function openAddToLearnModal(){
  _editingToLearn = null;
  $('modalTitle').textContent = 'Add to Learn';
  $('modalBody').innerHTML = addToLearnModalHtml();
  $('modalFoot').innerHTML = `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="currentSaveFn()">Save</button>`;
  currentSaveFn = saveToLearnForm;
  document.documentElement.style.setProperty('--tab-color', 'var(--t-growth)');
  $('modalOverlay').classList.add('open');
}
function saveToLearnForm(){
  const url = $('lo-tl-url').value.trim();
  if(!url){ alert('URL required'); return; }
  const items = load(NK.growth);
  items.unshift({id: uid(), businessId: activeBusinessId, category:'to-learn', url, title: $('lo-tl-title').value.trim(), status:'queued', sourceNoteId:null, createdAt: new Date().toISOString()});

  closeModal();
  renderGrowth();
