}
function editToLearnItem(id){
  const g = load(NK.growth).find(x => x.id === id);
  if(!g) return;
  _editingToLearn = id;
  $('modalTitle').textContent = 'Edit Queue Item';
  $('modalBody').innerHTML = `
    <div class="field"><label>URL *</label><input class="input" id="lo-tl-url" value="${esc(g.url)}"></div>
    <div class="field"><label>Title</label><input class="input" id="lo-tl-title" value="${esc(g.title||'')}"></div>`;
  $('modalFoot').innerHTML = `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="currentSaveFn()">Save</button>`;
  currentSaveFn = saveEditToLearnForm;
  document.documentElement.style.setProperty('--tab-color', 'var(--t-growth)');
  $('modalOverlay').classList.add('open');
}
function saveEditToLearnForm(){
  const items = load(NK.growth);
  const g = items.find(x => x.id === _editingToLearn);
  if(!g) return;
  const url = $('lo-tl-url').value.trim();
  if(!url){ alert('URL required'); return; }
  g.url = url;
  g.title = $('lo-tl-title').value.trim();
  save(NK.growth, items);
  closeModal();
  renderGrowth();
}
function deleteToLearnItem(id){
  save(NK.growth, load(NK.growth).filter(g => g.id !== id));
  renderGrowth();
  updateAllPills();
}
function cycleToLearnStatus(id){
  const items = load(NK.growth);
  const g = items.find(x => x.id === id);
  if(!g) return;
  g.status = g.status === 'queued' ? 'extracting' : 'queued';

// ---- Add extraction result (manual data entry until automation exists) ----
function extractionModalHtml(){
  const queue = loadScoped(NK.growth).filter(g => g.category==='to-learn' && g.status!=='done');
  return `
    <div class="field"><label>Link to queued item (optional)</label>
      <select class="select" id="lo-ext-tolearn">
        <option value="">— Manual entry, no queue link —</option>
        ${queue.map(q => `<option value="${q.id}" ${_extractionToLearnId===q.id?'selected':''}>${esc(q.title||q.url)}</option>`).join('')}
      </select>
    </div>
    <div class="field"><label>Paste JSON (optional)</label>
      <textarea class="input" id="lo-ext-json" placeholder='{"sourceName":"...","summary":"...","lessons":["..."],"ideas":["..."]}' style="min-height:70px"></textarea>
      <button type="button" class="btn btn-ghost" style="margin-top:6px" onclick="parseExtractionJson()">Parse JSON into fields ↓</button>
    </div>
    <div class="field"><label>Source Name *</label><input class="input" id="lo-ext-name" placeholder="Book / article / video title"></div>
    <div class="field"><label>Summary</label><textarea class="input" id="lo-ext-summary"></textarea></div>
    <div class="field"><label>Lessons <span style="font-weight:400">(one per line)</span></label><textarea class="input" id="lo-ext-lessons" style="min-height:70px"></textarea></div>
    <div class="field"><label>Ideas <span style="font-weight:400">(one per line)</span></label><textarea class="input" id="lo-ext-ideas" style="min-height:70px"></textarea></div>`;
}
function openExtractionModal(toLearnId){
  _extractionToLearnId = toLearnId || null;
  $('modalTitle').textContent = 'Add Extraction Result';
  $('modalBody').innerHTML = extractionModalHtml();
  $('modalFoot').innerHTML = `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="currentSaveFn()">Save</button>`;
  currentSaveFn = saveExtractionForm;
  document.documentElement.style.setProperty('--tab-color', 'var(--t-growth)');
  $('modalOverlay').classList.add('open');
  if(toLearnId){
    const item = load(NK.growth).find(g => g.id === toLearnId);
    if(item){ const f = $('lo-ext-name'); if(f) f.value = item.title || ''; }
  }
}
function parseExtractionJson(){
  try{
    const obj = JSON.parse($('lo-ext-json').value);
    if(obj.sourceName) $('lo-ext-name').value = obj.sourceName;
    if(obj.summary) $('lo-ext-summary').value = obj.summary;
    if(Array.isArray(obj.lessons)) $('lo-ext-lessons').value = obj.lessons.join('\n');
    if(Array.isArray(obj.ideas)) $('lo-ext-ideas').value = obj.ideas.join('\n');
  }catch(e){ alert('Could not parse JSON: ' + e.message); }
}
function saveExtractionForm(){
  const sourceName = $('lo-ext-name').value.trim();
  if(!sourceName){ alert('Source name required'); return; }
  const toLearnId = $('lo-ext-tolearn').value || null;
  const lessons = $('lo-ext-lessons').value.split('\n').map(s => s.trim()).filter(Boolean).map(text => ({id: uid(), text, decided:false, keptToLibrary:false}));
  const ideas = $('lo-ext-ideas').value.split('\n').map(s => s.trim()).filter(Boolean).map(text => ({id: uid(), text, decided:false, actedOn:false}));
  const items = load(NK.growth);
  items.unshift({id: uid(), businessId: activeBusinessId, category:'source', toLearnId, sourceName, summary: $('lo-ext-summary').value.trim(), lessons, ideas, createdAt: new Date().toISOString()});
  if(toLearnId){
    const q = items.find(x => x.id === toLearnId);
    if(q) q.status = 'done';
  }
  save(NK.growth, items);
  closeModal();
  renderGrowth();
  updateAllPills();
}

// ---- Lesson / idea decisions ----
function keepLessonToLibrary(sourceId, lessonId, category){
  const items = load(NK.growth);
  const s = items.find(x => x.id === sourceId);
  const l = s && s.lessons.find(x => x.id === lessonId);
  if(!l) return;
  const lib = load(NK.library);
  lib.unshift({id: uid(), businessId: activeBusinessId, title: l.text.slice(0,120), url:'', content: l.text, summary:'', category, sourceId, createdAt: new Date().toISOString()});
  save(NK.library, lib);
  l.decided = true; l.keptToLibrary = true;
  save(NK.growth, items);
  _lessonPicker = null;
  renderGrowth();
  updateAllPills();
  showToast('Kept to Library → ' + category);
}
function discardLesson(sourceId, lessonId){
  const items = load(NK.growth);
  const s = items.find(x => x.id === sourceId);
  const l = s && s.lessons.find(x => x.id === lessonId);
  if(!l) return;
  l.decided = true;
  save(NK.growth, items);
  renderGrowth();
  updateAllPills();
}
function actOnIdea(sourceId, ideaId){
  const items = load(NK.growth);
  const s = items.find(x => x.id === sourceId);
  const i = s && s.ideas.find(x => x.id === ideaId);
  if(!i) return;
  const notes = load(NK.notes);
  notes.unshift({id: uid(), businessId: activeBusinessId, text: i.text, category: NOTE_CATS[0], dept:null, source:'', status:'open', routedTo:null, originSourceId: sourceId, created: today(), ts: Date.now()});
  save(NK.notes, notes);
  i.decided = true; i.actedOn = true;
  save(NK.growth, items);
  renderGrowth();
  updateAllPills();
  if(activeTab === 'home') renderHome();
  showToast('Sent to Capture inbox');
}
function discardIdea(sourceId, ideaId){
  const items = load(NK.growth);
  const s = items.find(x => x.id === sourceId);
  const i = s && s.ideas.find(x => x.id === ideaId);
  if(!i) return;
  i.decided = true;
  save(NK.growth, items);
  renderGrowth();
  updateAllPills();
}

function libraryRow(it){
  return `

      <div style="flex:1;min-width:0">

        ${it.summary?`<div class="matrix-task-notes" style="margin-top:3px">${esc(it.summary)}</div>`:it.content?`<div class="matrix-task-notes" style="margin-top:3px">${esc(it.content.slice(0,140))}</div>`:''}

function renderLibrary(){
  const searchEl = $('lib-search');
  if(!searchEl) return;
  const q = (searchEl.value || '').toLowerCase().trim();
  const items = loadScoped(NK.library).filter(it =>
    !q || (it.title||'').toLowerCase().includes(q) || (it.content||'').toLowerCase().includes(q));
  const byCat = c => items.filter(it => it.category === c).sort((a,b) => (b.createdAt||'') < (a.createdAt||'') ? -1 : 1);

  const sops = byCat('SOPs');
  const sopsHtml = `
    <div style="margin-bottom:20px">
      <div class="card-header" style="padding-left:0;border-bottom:none"><div class="card-title" style="color:var(--t-library)">📌 SOPs (${sops.length})</div></div>
      <div class="card" style="border-color:color-mix(in srgb,var(--t-library) 35%,var(--border))">${sops.length ? sops.map(libraryRow).join('') : `<div class="empty-state">No SOPs yet</div>`}</div>
    </div>`;

  const rest = LIBRARY_CATEGORIES.filter(c => c !== 'SOPs').map(c => {
    const catItems = byCat(c);
    return `
      <div class="card-header" style="padding-left:0;border-bottom:none"><div class="card-title">${esc(c)} (${catItems.length})</div></div>
      <div class="card" style="margin-bottom:16px">${catItems.length ? catItems.map(libraryRow).join('') : `<div class="empty-state">Nothing here yet</div>`}</div>`;
  }).join('');

  $('library-list').innerHTML = sopsHtml + rest;
}

function libraryModalHtml(it){
  return `
    <div class="field"><label>Title *</label><input class="input" id="lo-lib-title" value="${it?esc(it.title):''}" placeholder="What is this?"></div>
    <div class="field">
      <label>Category</label>
      <div class="chip-row" id="lo-lib-cat-chips">${LIBRARY_CATEGORIES.map(c => `<button type="button" class="chip ${(it?it.category:'General')===c?'on':''}" onclick="document.getElementById('lo-lib-cat').value='${c}';document.querySelectorAll('#lo-lib-cat-chips .chip').forEach(b=>b.classList.remove('on'));this.classList.add('on')">${c}</button>`).join('')}</div>
      <input type="hidden" id="lo-lib-cat" value="${it?it.category:'General'}">
    </div>
    <div class="field"><label>URL (optional)</label><input class="input" id="lo-lib-url" value="${it?esc(it.url||''):''}" placeholder="https://..."></div>
    <div class="field"><label>Summary (optional)</label><input class="input" id="lo-lib-summary" value="${it?esc(it.summary||''):''}" placeholder="One-line summary"></div>
    <div class="field"><label>Content</label><textarea class="input" id="lo-lib-content" style="min-height:120px">${it?esc(it.content||''):''}</textarea></div>`;
}
function openLibraryModal(id){
  const it = id ? load(NK.library).find(x => x.id === id) : null;
  _editingLibrary = id || null;
  $('modalTitle').textContent = id ? 'Edit Library Item' : 'New Library Item';
  $('modalBody').innerHTML = libraryModalHtml(it);
  $('modalFoot').innerHTML = `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="currentSaveFn()">Save</button>`;
  currentSaveFn = saveLibraryForm;
  document.documentElement.style.setProperty('--tab-color', 'var(--t-library)');
  $('modalOverlay').classList.add('open');
}
function saveLibraryForm(){
  const title = $('lo-lib-title').value.trim();
  if(!title){ alert('Title required'); return; }
  const items = load(NK.library);
  const fields = {
    title,

function weekSunday(d = new Date()){
  const dt = new Date(d); dt.setDate(dt.getDate() - dt.getDay());
  return localDateStr(dt);
}
function fmtWeekRange(sunday){
  const s = new Date(sunday+'T12:00:00');
  const e = new Date(s); e.setDate(e.getDate()+6);
  const fmt = d => d.toLocaleDateString(undefined,{month:'short',day:'numeric'});
  return `${fmt(s)} - ${fmt(e)}`;
}

function saveReview(){
  const week = weekSunday();
  const fields = {
    week,
    overall: parseInt($('rv-overall').value),
    energy: parseInt($('rv-energy').value),
    focus: parseInt($('rv-focus').value),
    wins: $('rv-wins').value.trim(),
    losses: $('rv-losses').value.trim(),
    priority: $('rv-priority').value.trim(),
    vision: $('rv-vision').value.trim(),
    ts: Date.now(),
  };
  const reviews = load(NK.reviews);
  const i = reviews.findIndex(r => r.week === week && r.businessId === activeBusinessId);
  if(i >= 0) reviews[i] = {...reviews[i], ...fields};
  else reviews.unshift({id: uid(), businessId: activeBusinessId, ...fields});
  save(NK.reviews, reviews);
  ['rv-overall','rv-energy','rv-focus'].forEach(id => { $(id).value = 7; $(id+'-val').textContent = 7; });
  ['rv-wins','rv-losses','rv-priority','rv-vision'].forEach(id => $(id).value = '');
  showToast('Weekly review saved');
  renderReview();
}

function loadReview(id){
  const r = load(NK.reviews).find(x => x.id === id);
  if(!r) return;
  $('rv-overall').value = r.overall; $('rv-overall-val').textContent = r.overall;
  $('rv-energy').value = r.energy; $('rv-energy-val').textContent = r.energy;
  $('rv-focus').value = r.focus; $('rv-focus-val').textContent = r.focus;
  $('rv-wins').value = r.wins || ''; $('rv-losses').value = r.losses || '';
  $('rv-priority').value = r.priority || ''; $('rv-vision').value = r.vision || '';
}

function renderReview(){
  const tasks = allDeptTasksScoped();
  const weekAgo = localDateStr(new Date(Date.now() - 7*86400000));
  const doneThisWeek = tasks.filter(t => t.done && t.due && t.due >= weekAgo).length;
  const openCount = tasks.filter(t => !t.done).length;
  const goals = loadScoped(NK.goals);
  const goalAvg = goals.length ? Math.round(goals.reduce((s,g) => s + (g.progress||0), 0) / goals.length) : 0;
  const habits = load(NK.habits);
  const habitLog = load(NK.habitLog);
  const last7Days = []; for(let i=6;i>=0;i--){ const x=new Date(); x.setDate(x.getDate()-i); last7Days.push(localDateStr(x)); }
  const habitConsistency = habits.length ? Math.round(last7Days.reduce((sum,day) => sum + (habitLog.filter(e => e.date===day).length/habits.length)*100, 0)/7) : 0;
  const taskScore = Math.min(100, doneThisWeek * 10);
  const weeklyScore = Math.round((taskScore + goalAvg + habitConsistency) / 3);
  $('review-scorecard').innerHTML = `
    <div class="stat-tile"><div class="stat-num" style="color:var(--t-review)">${weeklyScore}</div><div class="stat-label">Weekly Score</div></div>
    <div class="stat-tile"><div class="stat-num">${taskScore}%</div><div class="stat-label">Tasks Completed</div></div>
    <div class="stat-tile"><div class="stat-num">${habitConsistency}%</div><div class="stat-label">Habit Consistency</div></div>
    <div class="stat-tile"><div class="stat-num">${goalAvg}%</div><div class="stat-label">Goal Progress</div></div>
    <div class="stat-tile"><div class="stat-num">${openCount}</div><div class="stat-label">Open Tasks</div></div>`;

  const reviews = loadScoped(NK.reviews).sort((a,b) => b.week < a.week ? -1 : 1);
  $('review-history').innerHTML = reviews.length ? reviews.map(r => `
    <div class="list-row" style="cursor:pointer" onclick="loadReview('${r.id}')">
      <div style="flex:1">
        <div class="matrix-task-title">Week of ${fmtWeekRange(r.week)} — ${r.overall}/10</div>
        <div class="progress-track" style="margin:6px 0"><div class="progress-fill" style="width:${r.overall*10}%;background:var(--t-review)"></div></div>
        <div class="matrix-task-notes">${esc((r.priority||'').slice(0,80))}</div>
      </div>
    </div>`).join('') : `<div class="empty-state">No reviews yet</div>`;
}

  return `<button onclick="${fn}('${id}')" style="background:transparent;border:none;cursor:pointer;color:var(--text-muted);font-size:13px;padding:3px 7px;border-radius:3px" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--text-muted)'">✕</button>`;
}
function dbTable(headers, rows){
  const ths = headers.map(h => `<th>${h}</th>`).join('');
  const trs = rows.length ? rows.join('') : `<tr><td colspan="${headers.length}" class="db-empty">No records yet.</td></tr>`;
  return `<table class="db-table"><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
}
function dbRow(cells, onclick){ return `<tr${onclick?` onclick="${onclick}" style="cursor:pointer"`:''}>${cells.map(c=>`<td>${c}</td>`).join('')}</tr>`; }

// Shared by the Capture tab's inline status filter and the Logs page's filter bar --
// same concept (note status), same look, wherever it's shown.
function noteStatusChipsHtml(current, notes, onclickFn){
  const chips = [{v:'', l:'All'}, ...NOTE_LOG_STATUSES];
  return chips.map(c => {
    const cnt = c.v === '' ? notes.length : notes.filter(n => n.status === c.v).length;
    if(cnt === 0 && c.v !== '') return '';
    const on = current === c.v;
    const border = on ? (c.col ? `color-mix(in srgb,${c.col} 50%,transparent)` : 'var(--accent)') : 'var(--border-md)';
    const bg = on ? (c.bg || 'rgba(96,165,250,.15)') : 'transparent';
    const col = on ? (c.col || 'var(--accent)') : 'var(--text-muted)';
    return `<button type="button" onclick="${onclickFn}('${c.v}')" style="padding:4px 12px;border-radius:99px;border:1px solid ${border};background:${bg};color:${col};cursor:pointer;font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;transition:all .15s">${c.l}<span style="opacity:.65;font-size:9px;margin-left:3px">${cnt}</span></button>`;

const _SB_URL = 'https://eewyzqyxwwkdimonltjy.supabase.co';
const _SB_KEY = 'sb_publishable_qgfJXOAlB33B2mDNqeWAUQ_nFpBv-bN';
const _SB_TABLE = 'leanoffice_sync';
const _SYNC_TS_KEY = '_lo_last_sync';
const _PENDING_KEY = '_lo_pending';
const SYNC_COLS = [...DEPTS.map(d => d.key), 'notes', 'goals', 'habits', 'habitLog', 'meetings', 'growth', 'reviews', 'businesses', 'library', 'directory', 'projects'];
let _sb = null, _sbUser = null, _bgPollTimer = null;

function initSupabase(){
  if(typeof supabase !== 'undefined') _sb = supabase.createClient(_SB_URL, _SB_KEY);
}

function setSyncStatus(state, label){
  const dot = $('syncDot'), lbl = $('syncLabel'), btn = $('syncLogoutBtn');
  if(!dot) return;
  dot.className = 'sync-dot' + (state==='on' ? '' : state==='syncing' ? ' syncing' : ' off');
  lbl.textContent = label;
  if(btn) btn.style.display = state==='on' ? 'inline' : 'none';
}

function _colName(k){ return k.replace(/^lo_/, ''); }
function _colKey(col){ return 'lo_' + col; }

function _toRows(arr){
  if(!Array.isArray(arr)) return [];
  return arr.filter(x => x && x.id).map(x => ({item_id: x.id, value: x}));
}

async function sbPush(k, v, oldRaw){
  if(!_sb || !_sbUser) return;
  const col = _colName(k);
  if(!SYNC_COLS.includes(col)) return; // ignore unrelated localStorage keys
  const ts = new Date().toISOString();
  const rows = _toRows(v);
  try{
    if(rows.length){
      await _sb.from(_SB_TABLE).upsert(
        rows.map(r => ({user_id:_sbUser.id, collection:col, item_id:r.item_id, value:r.value, updated_at:ts})),
        {onConflict:'user_id,collection,item_id'}
      );
    }
    if(oldRaw){
      let oldArr; try{ oldArr = JSON.parse(oldRaw); }catch{ oldArr = []; }
      if(Array.isArray(oldArr) && Array.isArray(v)){
        const newIds = new Set(v.map(x => x && x.id));
        const deleted = oldArr.filter(x => x && x.id && !newIds.has(x.id));
        if(deleted.length){
          await _sb.from(_SB_TABLE).upsert(
            deleted.map(x => ({user_id:_sbUser.id, collection:col, item_id:x.id, value:null, updated_at:ts})),
            {onConflict:'user_id,collection,item_id'}
          );
        }
      }
    }
    _sbClearPending(k);
  }catch(e){
    console.warn('LeanOffice sync push error', e);
    _sbQueuePending(k, v);
  }
}

async function _sbDoPull(){
  const lastSync = localStorage.getItem(_SYNC_TS_KEY);
  let q = _sb.from(_SB_TABLE).select('collection,item_id,value,updated_at').eq('user_id', _sbUser.id);
  if(lastSync) q = q.gt('updated_at', lastSync);
  const {data, error} = await q;
  if(!error && data && data.length){
    const byCol = {};
    data.forEach(r => { (byCol[r.collection] || (byCol[r.collection] = [])).push(r); });
    Object.entries(byCol).forEach(([col, rows]) => {
      if(!SYNC_COLS.includes(col)) return;
      const k = _colKey(col);
      let local; try{ local = JSON.parse(localStorage.getItem(k) || '[]'); }catch{ local = []; }
      const byId = new Map((Array.isArray(local)?local:[]).map(x => [x.id, x]));
      rows.forEach(r => {
        if(r.value === null) byId.delete(r.item_id);
        else byId.set(r.item_id, r.value);
      });
      localStorage.setItem(k, JSON.stringify([...byId.values()]));
    });
    // Only advance the watermark past rows actually applied above -- a row
    // whose collection isn't in SYNC_COLS (e.g. added to the schema after
    // this device's last sync) must stay fetchable on the next pull instead
    // of being silently skipped forever once maxTs passes its updated_at.
    const maxTs = data.reduce((m,r) => (SYNC_COLS.includes(r.collection) && r.updated_at > m) ? r.updated_at : m, '');
    if(maxTs) localStorage.setItem(_SYNC_TS_KEY, maxTs);
  } else if(!lastSync){
    localStorage.setItem(_SYNC_TS_KEY, new Date().toISOString());
  }
  await sbFlushPending();
}

function _sbQueuePending(k, v){
  try{ const p = JSON.parse(localStorage.getItem(_PENDING_KEY) || '{}'); p[k] = {v, ts:Date.now()}; localStorage.setItem(_PENDING_KEY, JSON.stringify(p)); }catch{}
}
function _sbClearPending(k){
  try{ const p = JSON.parse(localStorage.getItem(_PENDING_KEY) || '{}'); if(p[k]){ delete p[k]; localStorage.setItem(_PENDING_KEY, JSON.stringify(p)); } }catch{}
}
async function sbFlushPending(){
  if(!_sb || !_sbUser) return;
  let p; try{ p = JSON.parse(localStorage.getItem(_PENDING_KEY) || '{}'); }catch{ return; }
  const keys = Object.keys(p);
  if(!keys.length) return;
  for(const k of keys){
    try{
      const raw = localStorage.getItem(k);
      if(raw === null){ delete p[k]; continue; }
      await sbPush(k, JSON.parse(raw));
      delete p[k];
    }catch(e){ console.warn('LeanOffice flush error', k, e); }
  }
  localStorage.setItem(_PENDING_KEY, JSON.stringify(p));
}

function startBgPoll(){
  if(_bgPollTimer) return;
  _bgPollTimer = setInterval(async () => {
    if(!_sb || !_sbUser) return;
    try{
      await _sbDoPull();
      mergeDuplicateBusinesses();
      rerenderScopedViews();
      renderHabits();
      renderDirectory();
      renderBizSwitcher();
    }catch(e){ console.warn('LeanOffice background poll error', e); }
  }, 60000);
}

async function sbPullAndStart(){
  setSyncStatus('syncing', 'Syncing…');
  const btn = $('auth-btn');
  if(btn){ btn.textContent = 'Syncing data…'; btn.disabled = true; }
  const pullTimeout = new Promise((_, rej) => setTimeout(() => rej(new Error('Sync timed out')), 12000));
  try{
    await Promise.race([_sbDoPull(), pullTimeout]);
  }catch(e){
    console.warn('LeanOffice pull error — starting with local data', e);
    showToast('Sync timed out — showing local data');
  }
  const email = _sbUser.email || 'Synced';
  setSyncStatus('on', _sbUser.user_metadata?.full_name || email.split('@')[0]);
  $('auth-screen').style.display = 'none';
  if(btn){ btn.textContent = 'Sign In'; btn.disabled = false; }
  init();
  startBgPoll();
}

async function sbCheckSession(){
  if(!_sb) return;
  try{
    const {data:{session}} = await _sb.auth.getSession();
    if(session){ _sbUser = session.user; await sbPullAndStart(); }
    else{ $('auth-screen').style.display = 'flex'; }
  }catch(e){
    console.warn('LeanOffice session check failed', e);
    $('auth-screen').style.display = 'flex';
  }
}

function switchAuthTab(which){
  const inTab = $('auth-tab-in'), upTab = $('auth-tab-up'), nameField = $('auth-name-field'), btn = $('auth-btn');
  const isUp = which === 'up';
  inTab.classList.toggle('on', !isUp);
  upTab.classList.toggle('on', isUp);
  nameField.style.display = isUp ? 'block' : 'none';
  btn.textContent = isUp ? 'Sign Up' : 'Sign In';
  $('auth-err').textContent = '';
}

function skipAuth(){
  $('auth-screen').style.display = 'none';
  init();
}

async function doAuth(){
  const email = ($('auth-email')||{value:''}).value.trim();
  const pass = ($('auth-password')||{value:''}).value;
  const isSignUp = $('auth-tab-up').classList.contains('on');
  const name = isSignUp ? ($('auth-name')||{value:''}).value.trim() : '';
  const errEl = $('auth-err'), btn = $('auth-btn');
  const showErr = msg => { errEl.style.color = 'var(--red)'; errEl.textContent = msg; };
  if(isSignUp && !name){ showErr('Please enter your name.'); return; }
  if(!email || !pass){ showErr('Email and password required.'); return; }
  if(!_sb){ showErr('Connection unavailable. Use "Use without account" to continue offline.'); return; }
  btn.textContent = 'Loading…'; btn.disabled = true; errEl.textContent = '';
  const timeout = new Promise((_, rej) => setTimeout(() => rej(new Error('Request timed out — check your connection and try again.')), 12000));
  try{
    if(isSignUp){
      const {error:e} = await Promise.race([_sb.auth.signUp({email, password:pass, options:{data:{full_name:name}}}), timeout]);
      if(e) throw e;
      errEl.style.color = 'var(--green)'; errEl.textContent = 'Account created! Signing you in…';
    }
    const {data, error} = await Promise.race([_sb.auth.signInWithPassword({email, password:pass}), timeout]);
    if(error) throw error;
    _sbUser = data.user;
    await sbPullAndStart();
  }catch(e){
    showErr(e.message || 'Authentication failed.');
    btn.textContent = isSignUp ? 'Sign Up' : 'Sign In';
    btn.disabled = false;
  }
}

async function doSignOut(){
  if(_sb) await _sb.auth.signOut();
  _sbUser = null;
  clearInterval(_bgPollTimer); _bgPollTimer = null;
  localStorage.removeItem(_SYNC_TS_KEY);
  setSyncStatus('off', 'Not signed in');
  $('auth-screen').style.display = 'flex';
  $('auth-password').value = '';
  $('auth-err').textContent = '';
  $('auth-btn').textContent = 'Sign In';
  $('auth-btn').disabled = false;
}

// ---------------------------------------------------------------
// Boot
// ---------------------------------------------------------------
initSupabase();
if(_sb){ sbCheckSession(); }
else { $('auth-screen').style.display = 'none'; init(); }
</script>
</body>
</html>
